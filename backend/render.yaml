services:
  - type: web
    name: master-sets-scan
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this manually in Render dashboard — never commit your key
      - key: ALLOWED_ORIGIN
        value: "*"           # Tighten to your app bundle origin after launch
      - key: PORT
        value: 10000         # Render free tier uses port 10000
    healthCheckPath: /health
