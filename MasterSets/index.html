    // ── ManualEntryScreen ─────────────────────────────────────────────────────
    function ManualEntryScreen({ prefillName = "", prefillSet = "", navigate, goBack }) {
      const [name, setName] = useState(prefillName);
      const [cardSet, setCardSet] = useState(prefillSet);
      const [searching, setSearching] = useState(false);
      const [results, setResults] = useState([]);
      const [selectedCard, setSelectedCard] = useState(null);
      const [searchError, setSearchError] = useState(null);
      const [favorites, setFavorites] = useState({});
      const [wishlist, setWishlist] = useState({});
      const [collection, setCollection] = useState(null);
      const [saving, setSaving] = useState(false);
      const [toast, setToast] = useState(null);
      const showToast = (msg, type = "info") => setToast({ message: msg, type });

      useEffect(() => {
        let mounted = true;
        Promise.all([loadCardList(FAVORITES_KEY), loadCardList(WISHLIST_KEY), loadCollection()]).then(([favoriteCards, wishlistCards, col]) => {
          if (!mounted) return;
          setFavorites(favoriteCards); setWishlist(wishlistCards); setCollection(col);
        });
        return () => { mounted = false; };
      }, []);

      async function handleSearch() {
        if (!name.trim()) return;
        setSearching(true); setResults([]); setSelectedCard(null); setSearchError(null);
        try {
          const cards = await searchCardsByName(name.trim(), cardSet.trim());
          if (!cards.length) setSearchError(cardSet.trim() ? "No cards found for that Pokemon in the specified set" : "No cards found — try adjusting the Pokemon name");
          else setResults(cards);
        } catch (e) {
          setSearchError(e.message.includes("RATE_LIMITED") ? "Rate limited — try again in a moment" : "Search failed — check your connection");
        } finally { setSearching(false); }
      }

      async function handleSavedCardToggle(kind, card, isActive) {
        const key = kind === "favorite" ? FAVORITES_KEY : WISHLIST_KEY;
        const setState = kind === "favorite" ? setFavorites : setWishlist;
        const label = kind === "favorite" ? "Favorites" : "Wishlist";
        try {
          const updated = isActive ? await removeCardFromList(key, card.id) : await addCardToList(key, card);
          setState(updated);
          showToast(isActive ? `Removed from ${label}` : `Added to ${label}`, "info");
        } catch { showToast(`Could not update ${label.toLowerCase()}`, "error"); }
      }

      function handleGoToSet(card) {
        setSelectedCard(null);
        navigate("binder", { setId: card.set?.id ?? card.setId, initialCardId: card.id });
      }

      async function handleAddToCollection(card) {
        setSaving(true);
        try {
          const marketPrice = extractPrice(card);
          const updated = await saveCard(card, marketPrice);
          setCollection(updated);
          const qty = updated.cards?.[card.id]?.quantity ?? 1;
          showToast(qty === 1 ? "Card added to collection!" : `Added another copy! You now have ${qty}×`, "info");
        } catch { showToast("Failed to save — please try again", "error"); }
        finally { setSaving(false); }
      }

      const inputStyle = { background: "#1C1C1E", border: "none", borderRadius: 12, color: "#FFFFFF", padding: "14px 16px", fontSize: 16, width: "100%" };
      const labelStyle = { fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 6, display: "block", fontWeight: 700 };

      return (
        <div style={{ minHeight: "100vh", background: "#000000", color: "#FFFFFF", paddingBottom: 100 }}>
          <div className="safe-t16" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} style={{ padding: "16px 20px", background: "rgba(28,28,30,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 10, cursor: "pointer" }}>
            <div style={{ width: 36, height: 36, background: "#00C4BC", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <MatIcon name="search" size={18} color="#fff" />
            </div>
            <span style={{ fontSize: 20, fontWeight: 900, letterSpacing: "-0.02em", textTransform: "uppercase" }}>Search Cards</span>
            <button onClick={e => { e.stopPropagation(); (goBack || (() => navigate("search")))(); }} style={{ marginLeft: "auto", background: "none", border: "none", color: "#A1A1A1", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, fontWeight: 700, fontSize: 14, padding: "8px", minHeight: 44, minWidth: 44 }}>
              <MatIcon name="arrow_back" size={18} color="#A1A1A1" />
            </button>
          </div>

          <div style={{ padding: "20px" }}>
            <div style={{ background: "#131315", borderRadius: 32, padding: 20, marginBottom: 16 }}>
              <div style={{ marginBottom: 16 }}>
                <label style={labelStyle}>Pokemon Name</label>
                <input style={inputStyle} value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSearch()} placeholder="e.g. Pikachu" />
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={labelStyle}>Set Name <span style={{ color: "#6C6C6E" }}>(optional)</span></label>
                <input style={inputStyle} value={cardSet} onChange={e => setCardSet(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSearch()} placeholder="e.g. Twilight Masquerade" />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <button onClick={handleSearch} disabled={searching || !name.trim()} style={{ padding: "14px", background: name.trim() ? "#00C4BC" : "#3A3A3C", border: "none", borderRadius: 9999, color: "#fff", fontWeight: 800, fontSize: 13, cursor: name.trim() ? "pointer" : "not-allowed", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                  {searching ? <LoadingSpinner /> : <><MatIcon name="search" size={16} color="#fff" /> Find Cards</>}
                </button>
                <button onClick={() => navigate("bulkImport")} style={{ padding: "14px", background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                  <MatIcon name="upload" size={16} color="#FFFFFF" /> Bulk Import
                </button>
              </div>
            </div>

            {searchError && (
              <div style={{ background: "rgba(0,196,188,0.1)", border: "none", borderRadius: 16, padding: "14px 18px", color: "#fca5a5", fontSize: 14, marginBottom: 16 }}>{searchError}</div>
            )}

            {results.length > 0 && (
              <div className="fade-in">
                <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 12, fontWeight: 700 }}>Search Results</div>
                <div style={{ color: "#A1A1A1", fontSize: 13, marginBottom: 16 }}>
                  {results.length} card{results.length === 1 ? "" : "s"} found{cardSet.trim() ? ` in ${cardSet.trim()}` : " across all sets"}
                </div>
                <div style={{ display: "grid", gap: 10 }}>
                  {results.map(card => {
                    const marketPrice = extractPrice(card);
                    return (
                      <button key={card.id} className="card-interact list-row" onClick={() => setSelectedCard(card)}
                        style={{ background: "#131315", border: "none", borderRadius: 24, padding: 16, color: "#FFFFFF", cursor: "pointer", textAlign: "left", display: "flex", gap: 14 }}>
                        <img src={card.images?.small} alt={card.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0.3"; }} style={{ width: 72, height: 101, borderRadius: 10, objectFit: "contain", flexShrink: 0 }} />
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{card.name}</div>
                          <div style={{ color: "#A1A1A1", fontSize: 12, lineHeight: 1.4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{card.set?.name} · #{card.number}</div>
                          <div style={{ color: "#6C6C6E", fontSize: 11, marginTop: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>{card.set?.series || "Pokemon TCG"}</div>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, gap: 12 }}>
                            <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 9999, background: CHASE_RARITIES.has(card.rarity) ? "rgba(0,196,188,0.12)" : "#2C2C2E", fontSize: 10, color: CHASE_RARITIES.has(card.rarity) ? "#00C4BC" : "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                              {card.rarity || "—"}
                            </span>
                            <div style={{ fontSize: 16, fontWeight: 900, color: marketPrice != null ? "#30D158" : "#A1A1A1", letterSpacing: "-0.02em" }}>
                              {formatPrice(marketPrice)}
                            </div>
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {selectedCard && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setSelectedCard(null)} className="fade-in">
              <div style={{ background: "#131315", borderRadius: 32, width: "100%", maxWidth: 340, padding: 24 }} onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                  <div style={{ fontWeight: 900, fontSize: 18, letterSpacing: "-0.02em" }}>Card Details</div>
                  <button onClick={() => setSelectedCard(null)} style={{ background: "#2C2C2E", border: "none", color: "#A1A1A1", cursor: "pointer", borderRadius: "50%", width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <MatIcon name="close" size={18} />
                  </button>
                </div>
                <div style={{ display: "flex", gap: 16, marginBottom: 16 }}>
                  <div style={{ position: "relative", flexShrink: 0, display: "inline-block" }}>
                    <img src={selectedCard.images?.small} alt={selectedCard.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0.3"; }} className={CHASE_RARITIES.has(selectedCard.rarity) ? "card-aura" : ""} style={{ width: 110, borderRadius: 12, display: "block", objectFit: "contain" }} />
                    {CHASE_RARITIES.has(selectedCard.rarity) && <div className="holo-detail" style={{ borderRadius: 12 }} />}
                  </div>
                  <div>
                    <div style={{ fontWeight: 900, fontSize: 18, marginBottom: 6 }}>{selectedCard.name}</div>
                    <div style={{ fontSize: 11, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700, marginBottom: 4 }}>Set</div>
                    <div style={{ fontSize: 13, marginBottom: 10, fontWeight: 600 }}>{selectedCard.set?.name} <span style={{ color: "#A1A1A1" }}>#{selectedCard.number}</span></div>
                    <div style={{ fontSize: 11, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700, marginBottom: 4 }}>Market Value</div>
                    <div style={{ fontSize: 24, fontWeight: 900, color: extractPrice(selectedCard) != null ? "#30D158" : "#A1A1A1", letterSpacing: "-0.03em" }}>
                      {formatPrice(extractPrice(selectedCard))}
                    </div>
                  </div>
                </div>
                {(() => {
                  const owned = collection?.cards?.[selectedCard.id];
                  return (
                    <button onClick={() => handleAddToCollection(selectedCard)} disabled={saving} style={{ width: "100%", padding: "14px", marginBottom: 12, background: saving ? "#3A3A3C" : "#00C4BC", border: "none", borderRadius: 9999, color: "#fff", fontWeight: 800, fontSize: 14, cursor: saving ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                      {saving ? <LoadingSpinner /> : owned ? `Add Another Copy (have ${owned.quantity}×)` : "Add to Collection"}
                    </button>
                  );
                })()}
                <CardQuickActions card={selectedCard} favorites={favorites} wishlist={wishlist} onToggleSaved={handleSavedCardToggle} onGoToSet={handleGoToSet} compact={true} />
              </div>
            </div>
          )}
          {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}
        </div>
      );
    }

    function BulkImportScreen({ navigate, goBack }) {
      const [inputMode, setInputMode] = useState("paste");
      const [rawText, setRawText] = useState("");
      const [parsedRows, setParsedRows] = useState([]);
      const [matchRows, setMatchRows] = useState([]);
      const [ownedCollection, setOwnedCollection] = useState({ cards: {}, totalValue: 0, lastUpdated: null });
      const [recentHistory, setRecentHistory] = useState([]);
      const [editingIndex, setEditingIndex] = useState(null);
      const [editingRow, setEditingRow] = useState(null);
      const [processing, setProcessing] = useState(false);
      const [importing, setImporting] = useState(false);
      const [toast, setToast] = useState(null);
      const showToast = (message, type = "info") => setToast({ message, type });

      const importableRows = matchRows.filter(row => row.card && (row.status === "matched" || row.status === "best_guess"));
      const activeImportRows = importableRows.filter(row => row.shouldImport !== false);
      const unmatchedRows = matchRows.filter(row => !row.card);
      const ownedRows = matchRows.filter(row => row.card && row.isAlreadyOwned);
      const duplicateRows = matchRows.filter(row => row.card && row.isDuplicateInImport);
      const skippedRows = matchRows.filter(row => row.card && row.shouldImport === false);
      const hasPreview = matchRows.length > 0;

      useEffect(() => {
        let mounted = true;
        Promise.all([loadImportHistory(), loadCollection()]).then(([history, collection]) => {
          if (!mounted) return;
          setRecentHistory(history); setOwnedCollection(collection);
        });
        return () => { mounted = false; };
      }, []);

      useEffect(() => {
        setMatchRows(prev => prev.length > 0 ? decorateImportRowsWithCollection(prev, ownedCollection) : prev);
      }, [ownedCollection]);

      function applyCollectionReview(rows, collectionOverride = ownedCollection) {
        return decorateImportRowsWithCollection(rows, collectionOverride);
      }

      function handleParsedRows(rows) { setParsedRows(rows); setMatchRows([]); setEditingIndex(null); setEditingRow(null); }
      function handleTextChange(value) { setRawText(value); handleParsedRows(parseBulkImportText(value)); }

      function syncParsedRows(nextRows) { setParsedRows(nextRows); setRawText(nextRows.map(formatImportRow).join("\n")); }

      function handleFileChange(event) {
        const file = event.target.files?.[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = loadEvent => {
          const text = String(loadEvent.target?.result || "");
          setInputMode("upload"); setRawText(text); handleParsedRows(parseBulkImportText(text));
        };
        reader.onerror = () => showToast("Could not read that file", "error");
        reader.readAsText(file); event.target.value = "";
      }

      async function handlePreviewImport() {
        if (parsedRows.length === 0) { showToast("Add at least one import row first", "error"); return; }
        setProcessing(true);
        try {
          const resolved = await resolveBulkImportRows(parsedRows);
          setMatchRows(applyCollectionReview(resolved));
          const matchedCount = resolved.filter(row => row.card).length;
          showToast(`${matchedCount} card${matchedCount === 1 ? "" : "s"} ready to import`, "info");
        } catch { showToast("Could not preview this import", "error"); }
        finally { setProcessing(false); }
      }

      async function handleImport() {
        if (activeImportRows.length === 0) { showToast("No matched cards are ready to import", "error"); return; }
        setImporting(true);
        try {
          const { collection: updatedCollection, appliedRows } = await importCardsToCollection(activeImportRows);
          setOwnedCollection(updatedCollection);
          const nextHistory = await appendImportHistory({ importedCount: activeImportRows.length, unmatchedCount: unmatchedRows.length, appliedRows });
          setRecentHistory(nextHistory);
          const skippedCount = unmatchedRows.length;
          showToast(`Imported ${activeImportRows.length} card${activeImportRows.length === 1 ? "" : "s"}${skippedCount > 0 ? ` · ${skippedCount} unmatched` : ""}`, "info");
          setTimeout(() => navigate("home"), 500);
        } catch { showToast("Import failed", "error"); }
        finally { setImporting(false); }
      }

      async function handleUndoLastImport() {
        if (recentHistory.length === 0) { showToast("There is no import to undo", "error"); return; }
        return handleUndoImportAt(0);
      }

      async function handleUndoImportAt(index) {
        const entry = recentHistory[index];
        if (!entry) { showToast("That import could not be found", "error"); return; }
        if (!Array.isArray(entry.appliedRows) || entry.appliedRows.length === 0) { showToast("That import cannot be undone", "error"); return; }
        setImporting(true);
        try {
          const updatedCollection = await undoImportedCards(entry.appliedRows);
          const { history } = await removeImportHistoryAt(index);
          setOwnedCollection(updatedCollection); setRecentHistory(history);
          showToast(`Undid import of ${entry.importedCount} row${entry.importedCount === 1 ? "" : "s"}`, "info");
        } catch { showToast("Could not undo that import", "error"); }
        finally { setImporting(false); }
      }

      async function handleClearImportHistory() {
        if (recentHistory.length === 0) { showToast("Import history is already empty", "info"); return; }
        await saveImportHistory([]); setRecentHistory([]);
        showToast("Import history cleared", "info");
      }

      function startEditingRow(index) {
        const sourceRow = matchRows[index] || parsedRows[index]; if (!sourceRow) return;
        setEditingIndex(index);
        setEditingRow({ name: sourceRow.name || "", setName: sourceRow.setName || "", number: sourceRow.number || "", quantity: String(sourceRow.quantity ?? 1) });
      }

      function cancelEditingRow() { setEditingIndex(null); setEditingRow(null); }

      async function saveEditedRow(index) {
        if (!editingRow?.name?.trim()) { showToast("Card name is required", "error"); return; }
        const nextRow = { rawLine: formatImportRow(editingRow), name: editingRow.name.trim(), setName: editingRow.setName.trim(), number: editingRow.number.trim(), quantity: parseImportQuantity(editingRow.quantity) };
        const nextParsedRows = parsedRows.map((row, rowIndex) => rowIndex === index ? nextRow : row);
        syncParsedRows(nextParsedRows);
        setProcessing(true);
        try {
          const resolved = await resolveImportRow(nextRow);
          setMatchRows(prev => applyCollectionReview(prev.map((row, rowIndex) => rowIndex === index ? { ...resolved, shouldImport: row?.shouldImport } : row)));
          showToast(resolved.card ? "Row updated and rematched" : "Row updated but still needs review", resolved.card ? "info" : "error");
          cancelEditingRow();
        } catch { showToast("Could not rematch that row", "error"); }
        finally { setProcessing(false); }
      }

      async function retryMatchRow(index) {
        const row = parsedRows[index]; if (!row) return;
        setProcessing(true);
        try {
          const resolved = await resolveImportRow(row);
          setMatchRows(prev => applyCollectionReview(prev.map((entry, rowIndex) => rowIndex === index ? { ...resolved, shouldImport: entry?.shouldImport } : entry)));
          showToast(resolved.card ? "Row matched again" : "Still could not match that row", resolved.card ? "info" : "error");
        } catch { showToast("Could not retry that row", "error"); }
        finally { setProcessing(false); }
      }

      function removeRow(index) {
        const nextParsedRows = parsedRows.filter((_, rowIndex) => rowIndex !== index);
        const nextMatchRows = applyCollectionReview(matchRows.filter((_, rowIndex) => rowIndex !== index));
        syncParsedRows(nextParsedRows); setMatchRows(nextMatchRows);
        if (editingIndex === index) cancelEditingRow();
        if (editingIndex != null && editingIndex > index) setEditingIndex(editingIndex - 1);
        showToast("Row removed from import", "info");
      }

      function toggleRowImport(index) {
        setMatchRows(prev => applyCollectionReview(prev.map((row, rowIndex) => rowIndex === index ? { ...row, shouldImport: row.shouldImport === false } : row)));
      }

      const inputStyle = { width: "100%", background: "#1C1C1E", border: "none", borderRadius: 12, color: "#FFFFFF", padding: "14px 16px", fontSize: 16 };

      return (
        <div style={{ minHeight: "100vh", background: "#000000", color: "#FFFFFF", paddingBottom: 32 }}>
          <div className="safe-t16" style={{ padding: "16px 20px", background: "rgba(28,28,30,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={goBack || (() => navigate("search"))} style={{ background: "none", border: "none", color: "#A1A1A1", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", minHeight: 44, minWidth: 44, justifyContent: "center" }}>
              <MatIcon name="arrow_back" size={22} color="#A1A1A1" />
            </button>
            <div style={{ fontSize: 20, fontWeight: 900, letterSpacing: "-0.02em", textTransform: "uppercase" }}>Bulk Import</div>
          </div>

          <div style={{ padding: 20 }}>
            <div style={{ background: "#131315", borderRadius: 32, padding: 20, marginBottom: 16 }}>
              <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 12, fontWeight: 700 }}>Source</div>
              <div style={{ color: "#A1A1A1", fontSize: 13, lineHeight: 1.5, marginBottom: 16 }}>Paste a list or upload a file. Once the rows are in, preview them to see what will be imported.</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {[["paste", "Paste List"], ["upload", "Upload CSV"]].map(([mode, label]) => (
                  <button key={mode} onClick={() => setInputMode(mode)} style={{ padding: "8px 16px", minHeight: 44, borderRadius: 9999, background: inputMode === mode ? "#00C4BC" : "#1C1C1E", color: "#fff", fontSize: 11, fontWeight: 800, cursor: "pointer", border: "none", textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</button>
                ))}
              </div>
              <div style={{ color: "#A1A1A1", fontSize: 12, lineHeight: 1.5, marginBottom: 16 }}>Format: `name, set, number, quantity` — set, number, and quantity are optional.</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                <button onClick={downloadBulkImportTemplate} style={{ flex: 1, padding: "10px 12px", minHeight: 44, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>Download Template</button>
              </div>
              {inputMode === "paste" ? (
                <textarea value={rawText} onChange={e => handleTextChange(e.target.value)} placeholder={`Pikachu, Surging Sparks, 065, 2\nBulbasaur, Twilight Masquerade, 001, 1`} style={{ ...inputStyle, minHeight: 160, resize: "vertical", lineHeight: 1.5, borderRadius: 16 }} />
              ) : (
                <div style={{ display: "grid", gap: 12 }}>
                  <label style={{ ...inputStyle, display: "block", cursor: "pointer", textAlign: "center", fontWeight: 700, borderRadius: 9999 }}>
                    Choose CSV or text file
                    <input type="file" accept=".csv,.txt,text/csv,text/plain" onChange={handleFileChange} style={{ display: "none" }} />
                  </label>
                  <div style={{ color: "#A1A1A1", fontSize: 13 }}>{parsedRows.length > 0 ? `${parsedRows.length} row${parsedRows.length === 1 ? "" : "s"} parsed from file` : "No file loaded yet"}</div>
                </div>
              )}
              <div style={{ display: "grid", gap: 10, marginTop: 16 }}>
                <button onClick={handlePreviewImport} disabled={processing || parsedRows.length === 0} style={{ width: "100%", padding: "14px", background: parsedRows.length > 0 ? "#00C4BC" : "#3A3A3C", border: "none", borderRadius: 9999, color: "#fff", fontWeight: 800, cursor: parsedRows.length > 0 ? "pointer" : "not-allowed", fontSize: 14, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                  {processing ? "Matching Cards..." : "Preview Import"}
                </button>
                <div style={{ color: "#A1A1A1", fontSize: 12 }}>Parsed rows: {parsedRows.length}</div>
              </div>
            </div>

            {/* History */}
            <div style={{ background: "#131315", borderRadius: 32, padding: 20, marginBottom: 16 }}>
              <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 12, fontWeight: 700 }}>History</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700 }}>Recent Imports</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={handleClearImportHistory} disabled={recentHistory.length === 0} style={{ padding: "7px 12px", minHeight: 44, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#A1A1A1", fontWeight: 700, cursor: recentHistory.length > 0 ? "pointer" : "not-allowed", fontSize: 11 }}>Clear</button>
                  <button onClick={handleUndoLastImport} disabled={importing || recentHistory.length === 0 || !Array.isArray(recentHistory[0]?.appliedRows)} style={{ padding: "7px 12px", minHeight: 44, background: recentHistory.length > 0 && Array.isArray(recentHistory[0]?.appliedRows) ? "rgba(0,196,188,0.12)" : "#1C1C1E", border: "none", borderRadius: 9999, color: recentHistory.length > 0 && Array.isArray(recentHistory[0]?.appliedRows) ? "#fca5a5" : "#A1A1A1", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>Undo Last</button>
                  <button onClick={async () => setRecentHistory(await loadImportHistory())} style={{ padding: "7px 12px", minHeight: 44, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#A1A1A1", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>Refresh</button>
                </div>
              </div>
              {recentHistory.length > 0 ? (
                <div style={{ display: "grid", gap: 10 }}>
                  {recentHistory.slice(0, 4).map((entry, index) => (
                    <div key={`${entry.timestamp}-${index}`} style={{ display: "flex", justifyContent: "space-between", gap: 12, padding: "14px 16px", borderRadius: 20, background: "#1C1C1E" }}>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>Imported {entry.importedCount} card{entry.importedCount === 1 ? "" : "s"}</div>

                          <div style={{ color: "#6C6C6E", fontSize: 12, marginTop: 5 }}>{entry.appliedRows.slice(0, 2).map(row => row.name || row.cardId).join(", ")}{entry.appliedRows.length > 2 ? ` +${entry.appliedRows.length - 2} more` : ""}</div>
                        )}
                      </div>
                      <div style={{ textAlign: "right", display: "grid", gap: 8, justifyItems: "end" }}>
                        <div style={{ fontSize: 12, color: entry.unmatchedCount ? "#fca5a5" : "#30D158", fontWeight: 700 }}>
                          {index === 0 && Array.isArray(entry.appliedRows) ? "Undo ready" : entry.unmatchedCount ? `${entry.unmatchedCount} unmatched` : "Clean import"}
                        </div>
                        {Array.isArray(entry.appliedRows) && entry.appliedRows.length > 0 && (
                          <button onClick={() => handleUndoImportAt(index)} disabled={importing} style={{ padding: "7px 12px", minHeight: 44, background: "rgba(0,196,188,0.12)", border: "none", borderRadius: 9999, color: "#fca5a5", fontWeight: 700, cursor: importing ? "not-allowed" : "pointer", fontSize: 11 }}>Undo</button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ color: "#A1A1A1", fontSize: 13 }}>No imports yet. Your first successful bulk add will appear here.</div>
              )}
            </div>

            {hasPreview ? (
              <div className="fade-in">
                <div style={{ background: "#131315", borderRadius: 32, padding: 20, marginBottom: 16 }}>
                  <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 16, fontWeight: 700 }}>Import Review</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, minmax(0, 1fr))", gap: 8, marginBottom: 16 }}>
                    {[
                      { label: "Importing", value: activeImportRows.length, color: "#30D158" },
                      { label: "Owned", value: ownedRows.length, color: "#A1A1A1" },
                      { label: "Duplicate", value: duplicateRows.length, color: "#f59e0b" },
                      { label: "Skipped", value: skippedRows.length, color: "#6C6C6E" },
                    ].map(item => (
                      <div key={item.label} style={{ background: "#1C1C1E", borderRadius: 20, padding: "14px 8px", textAlign: "center" }}>
                        <div style={{ fontSize: 22, fontWeight: 900, color: item.color, marginBottom: 4 }}>{item.value}</div>
                        <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.08em" }}>{item.label}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{ display: "grid", gap: 12, marginBottom: 16 }}>
                  {matchRows.map((row, index) => {
                    const matchedCard = row.card;
                    const accent = row.status === "matched" ? "#30D158" : row.status === "best_guess" ? "#f59e0b" : "#fca5a5";
                    const isEditing = editingIndex === index;
                    return (
                      <div key={`${row.rawLine}-${index}`} style={{ background: "#131315", border: `1px solid ${accent}22`, borderRadius: 24, padding: 16 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", gap: 12, marginBottom: 8 }}>
                          <div style={{ fontWeight: 800, fontSize: 14 }}>{row.name}</div>
                          <div style={{ color: accent, fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.08em" }}>
                            {row.status === "matched" ? "Matched" : row.status === "best_guess" ? "Best Guess" : "Needs Help"}
                          </div>
                        </div>
                        <div style={{ color: "#6C6C6E", fontSize: 12, lineHeight: 1.4, marginBottom: 10 }}>{row.rawLine}</div>
                        {!isEditing && matchedCard && (
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
                            {row.isAlreadyOwned && <div style={{ padding: "4px 10px", borderRadius: 9999, background: "rgba(48,209,88,0.1)", fontSize: 11, fontWeight: 700, color: "#30D158" }}>Owned {row.ownedQuantity}</div>}
                            {row.isDuplicateInImport && <div style={{ padding: "4px 10px", borderRadius: 9999, background: "rgba(245,158,11,0.1)", fontSize: 11, fontWeight: 700, color: "#f59e0b" }}>Duplicate In File</div>}
                            {row.shouldImport === false && <div style={{ padding: "4px 10px", borderRadius: 9999, background: "#1C1C1E", fontSize: 11, fontWeight: 700, color: "#A1A1A1" }}>Skipped</div>}
                          </div>
                        )}
                        {isEditing ? (
                          <div style={{ display: "grid", gap: 10 }}>
                            <input value={editingRow?.name || ""} onChange={e => setEditingRow(prev => ({ ...(prev || {}), name: e.target.value }))} placeholder="Card name" style={{ ...inputStyle, padding: "11px 14px", borderRadius: 12 }} />
                            <input value={editingRow?.setName || ""} onChange={e => setEditingRow(prev => ({ ...(prev || {}), setName: e.target.value }))} placeholder="Set name" style={{ ...inputStyle, padding: "11px 14px", borderRadius: 12 }} />
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 90px", gap: 10 }}>
                              <input value={editingRow?.number || ""} onChange={e => setEditingRow(prev => ({ ...(prev || {}), number: e.target.value }))} placeholder="Card number" style={{ ...inputStyle, padding: "11px 14px", borderRadius: 12 }} />
                              <input value={editingRow?.quantity || ""} onChange={e => setEditingRow(prev => ({ ...(prev || {}), quantity: e.target.value }))} inputMode="numeric" placeholder="Qty" style={{ ...inputStyle, padding: "11px 14px", borderRadius: 12 }} />
                            </div>
                            <div style={{ display: "flex", gap: 8 }}>
                              <button onClick={() => saveEditedRow(index)} disabled={processing} style={{ flex: 1, padding: "11px", minHeight: 44, background: "#00C4BC", border: "none", borderRadius: 9999, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>Save Row</button>
                              <button onClick={cancelEditingRow} style={{ flex: 1, padding: "11px", minHeight: 44, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>Cancel</button>
                            </div>
                          </div>
                        ) : matchedCard ? (
                          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                            <img src={matchedCard.images?.small} alt={matchedCard.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0.3"; }} style={{ width: 52, height: 73, borderRadius: 8, objectFit: "contain", flexShrink: 0 }} />
                            <div style={{ minWidth: 0, flex: 1 }}>
                              <div style={{ fontWeight: 700, fontSize: 13 }}>{matchedCard.name}</div>
                              <div style={{ color: "#A1A1A1", fontSize: 12, marginTop: 2 }}>{matchedCard.set?.name} · #{matchedCard.number} · Qty {row.quantity}</div>
                              <div style={{ color: accent, fontSize: 12, marginTop: 4 }}>{row.reason}</div>
                              {(row.isAlreadyOwned || row.isDuplicateInImport) && <div style={{ color: "#6C6C6E", fontSize: 12, marginTop: 4 }}>{row.isAlreadyOwned ? `Owned now: ${row.ownedQuantity}. ` : ""}After import: {row.projectedQuantity}</div>}
                            </div>
                          </div>
                        ) : (
                          <div style={{ color: "#fca5a5", fontSize: 13 }}>{row.reason}</div>
                        )}
                        {!isEditing && (
                          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                            <button onClick={() => startEditingRow(index)} style={{ flex: 1, padding: "9px 10px", minHeight: 44, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>Edit</button>
                            <button onClick={() => retryMatchRow(index)} disabled={processing} style={{ flex: 1, padding: "9px 10px", minHeight: 44, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>Retry</button>
                            {matchedCard && <button onClick={() => toggleRowImport(index)} style={{ flex: 1, padding: "9px 10px", minHeight: 44, background: row.shouldImport === false ? "#00C4BC" : "#1C1C1E", border: "none", borderRadius: 9999, color: row.shouldImport === false ? "#fff" : "#FFFFFF", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>{row.shouldImport === false ? "Include" : "Skip"}</button>}
                            <button onClick={() => removeRow(index)} style={{ padding: "9px 12px", minHeight: 44, background: "rgba(0,196,188,0.1)", border: "none", borderRadius: 9999, color: "#fca5a5", fontWeight: 700, cursor: "pointer", fontSize: 11 }}>Remove</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                <button onClick={handleImport} disabled={importing || activeImportRows.length === 0} style={{ width: "100%", padding: "16px", background: activeImportRows.length > 0 ? "#00C4BC" : "#3A3A3C", border: "none", borderRadius: 9999, color: "#fff", fontWeight: 900, cursor: activeImportRows.length > 0 ? "pointer" : "not-allowed", fontSize: 15, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                  {importing ? "Importing..." : `Import ${activeImportRows.length} Row${activeImportRows.length === 1 ? "" : "s"}`}
                </button>
              </div>
            ) : (
              <div style={{ background: "#131315", borderRadius: 24, padding: 18, marginBottom: 16, color: "#A1A1A1", fontSize: 13, lineHeight: 1.5 }}>
                Preview an import to unlock the review section. This is where you will confirm matches, skip duplicates, and finalize the batch.
              </div>
            )}
          </div>
          {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}
        </div>
      );
    }

    function SearchHubScreen({ navigate }) {
      return (
        <div style={{ minHeight: "100vh", background: "#000000", color: "#FFFFFF", paddingBottom: 100 }}>
          <div className="safe-t16" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} style={{ padding: "16px 20px 14px", background: "rgba(28,28,30,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", position: "sticky", top: 0, zIndex: 10, cursor: "pointer" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <img src="./MSLogo_noBak.png" alt="Master Sets" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ width: 38, height: 38, objectFit: "contain", flexShrink: 0 }} />
              <div>
                <div style={{ fontSize: 22, fontWeight: 900, letterSpacing: "-0.02em", textTransform: "uppercase" }}>Search</div>
                <div style={{ color: "#A1A1A1", fontSize: 10, marginTop: 2, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700 }}>Search a single card or import many at once.</div>
              </div>
            </div>
          </div>
          <div style={{ padding: 20, display: "grid", gap: 12 }}>
            <button onClick={() => navigate("manual")} style={{ background: "#131315", border: "none", borderRadius: 32, padding: 20, color: "#FFFFFF", cursor: "pointer", textAlign: "left" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 10 }}>
                <div style={{ width: 44, height: 44, background: "#1C1C1E", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <MatIcon name="search" size={22} color="#A1A1A1" />
                </div>
                <div style={{ fontSize: 18, fontWeight: 900, letterSpacing: "-0.02em" }}>Search Cards</div>
              </div>
              <div style={{ color: "#A1A1A1", fontSize: 13, lineHeight: 1.5 }}>Look up a specific Pokemon card across sets and open its details.</div>
            </button>
            <button onClick={() => navigate("bulkImport")} style={{ background: "#131315", border: "1px solid rgba(0,196,188,0.3)", borderRadius: 32, padding: 20, color: "#FFFFFF", cursor: "pointer", textAlign: "left" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 10 }}>
                <div style={{ width: 44, height: 44, background: "#00C4BC", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <MatIcon name="upload" size={22} color="#fff" />
                </div>
                <div style={{ fontSize: 18, fontWeight: 900, letterSpacing: "-0.02em" }}>Bulk Import</div>
              </div>
              <div style={{ color: "#A1A1A1", fontSize: 13, lineHeight: 1.5, marginBottom: 14 }}>Paste a list or upload a CSV to add many cards in one session.</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
