    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes bounceIn { 0% { transform: scale(0.85); opacity: 0; } 60% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
    @keyframes aura-breathe { 0%, 100% { filter: drop-shadow(0 0 20px rgba(0,196,188,0.2)); } 50% { filter: drop-shadow(0 0 40px rgba(0,196,188,0.45)); } }
    @keyframes shimmer-sweep { 0% { transform: translateX(-100%) translateY(-100%); } 20%, 100% { transform: translateX(100%) translateY(100%); } }

    @keyframes holo-grid { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes holo-shine { 0%, 100% { transform: translateX(-80%) rotate(25deg); opacity: 0; } 40% { opacity: 1; } 60% { opacity: 1; } 100% { transform: translateX(180%) rotate(25deg); opacity: 0; } }
    .holo-thumbnail { position: absolute; inset: 0; border-radius: 10px; overflow: hidden; background: linear-gradient(120deg, rgba(255,80,180,0.32), rgba(80,200,255,0.32), rgba(120,255,120,0.26), rgba(255,200,80,0.26)); background-size: 300% 300%; animation: holo-grid 4s ease-in-out infinite; pointer-events: none; }
    .holo-thumbnail::after { content: ''; position: absolute; inset: -20%; width: 60%; background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.5) 50%, transparent 80%); animation: holo-shine 3.5s ease-in-out infinite 0.5s; pointer-events: none; }
    .holo-detail { position: absolute; inset: 0; border-radius: 16px; overflow: hidden; background: linear-gradient(120deg, rgba(255,80,180,0.30), rgba(80,200,255,0.30), rgba(120,255,120,0.24), rgba(255,200,80,0.24)); background-size: 300% 300%; animation: holo-grid 4s ease-in-out infinite; pointer-events: none; }
    .holo-detail::after { content: ''; position: absolute; inset: -20%; width: 55%; background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.45) 50%, transparent 80%); animation: holo-shine 3.5s ease-in-out infinite 0.5s; pointer-events: none; }
    .card-aura { filter: drop-shadow(0 0 20px rgba(0,196,188,0.2)); animation: aura-breathe 4s infinite ease-in-out; }
    .shimmer-effect { position: relative; overflow: hidden; }

    .btn-secondary { background: rgba(0,196,188,0.08); color: #00C4BC; border: 1px solid rgba(0,196,188,0.2); border-radius: 9999px; padding: 14px 20px; font-weight: 700; font-size: 13px; min-height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

    @media (hover: hover) { .card-interact:hover { transform: translateY(-5px) scale(1.025); z-index: 10; } }
    .card-interact:active { transform: scale(0.95); }
    .list-row { transition: background-color 0.15s ease-out; }
    @media (hover: hover) { .list-row:hover { background: #2C2C2E !important; } }
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% auto; animation: shimmer 1.5s linear infinite; border-radius: 8px; }
    .pill-tab { transition: background-color 0.18s ease-out, color 0.18s ease-out; min-height: 40px; }
    .safe-t16 { padding-top: calc(16px + env(safe-area-inset-top, 0px)) !important; }
    .safe-t20 { padding-top: calc(20px + env(safe-area-inset-top, 0px)) !important; }

    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

<body>
  <div id="root"></div>

  <!-- window.storage polyfill (localStorage-backed, Promise API matching artifact sandbox) -->
  <script>
    window.storage = {
      get: function(key) {
        try {
          var v = localStorage.getItem(key);
          return Promise.resolve(v !== null ? { value: v } : null);
        } catch(e) { return Promise.resolve(null); }
      },
      set: function(key, value) {
        try { localStorage.setItem(key, value); } catch(e) {
          if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
            window.dispatchEvent(new CustomEvent('storageQuotaExceeded'));
          }
        }
        return Promise.resolve();
      },
      delete: function(key) {
        try { localStorage.removeItem(key); } catch(e) {}
        return Promise.resolve();
      },
      list: function(prefix) {
        prefix = prefix || '';
        try {
          var keys = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.startsWith(prefix)) keys.push(k);
          }
          return Promise.resolve({ keys: keys });
        } catch(e) { return Promise.resolve({ keys: [] }); }
      }
    };
    // window.ANTHROPIC_API_KEY, window.POKEBINDER_SCAN_ENDPOINT,
    // window.MASTERSET_SUPABASE_URL, and window.MASTERSET_SUPABASE_ANON_KEY
    // are injected by Swift at document start

    // ── Clear any previously seeded demo data ───────────────────────────────
    (function clearDemoData() {
      try {
        if (localStorage.getItem('demoSeedVersion')) {
          localStorage.removeItem('demoSeedVersion');
          localStorage.removeItem('collection');
        }
      } catch(e) {}
    })();
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Material Symbol icon components ──────────────────────────────────────
    const MatIcon = ({ name, size = 22, color = "currentColor", filled = false, style: extraStyle = {} }) => (
      <span className="material-symbols-outlined" style={{
        fontSize: size,
        color,
        fontVariationSettings: `'FILL' ${filled ? 1 : 0}, 'wght' 400, 'GRAD' 0, 'opsz' 24`,
        lineHeight: 1,
        ...extraStyle,
      }}>{name}</span>
    );

    // Legacy icon aliases for backward compatibility
    const Camera = ({ size = 22, color = "currentColor" }) => <MatIcon name="photo_camera" size={size} color={color} />;
    const Upload = ({ size = 22, color = "currentColor" }) => <MatIcon name="upload" size={size} color={color} />;
    const AlertTriangle = ({ size = 22, color = "currentColor" }) => <MatIcon name="warning" size={size} color={color} />;
    const XIcon = ({ size = 22, color = "currentColor" }) => <MatIcon name="close" size={size} color={color} />;
    const Check = ({ size = 22, color = "currentColor" }) => <MatIcon name="check" size={size} color={color} />;
    const RotateCcw = ({ size = 22, color = "currentColor" }) => <MatIcon name="refresh" size={size} color={color} />;
    const Plus = ({ size = 22, color = "currentColor" }) => <MatIcon name="add" size={size} color={color} />;
    const Star = ({ size = 22, color = "currentColor", fill: f = "none" }) => <MatIcon name="star" size={size} color={color} filled={f !== "none"} />;
    const Search = ({ size = 22, color = "currentColor" }) => <MatIcon name="search" size={size} color={color} />;
    const Home = ({ size = 22, color = "currentColor" }) => <MatIcon name="home_storage" size={size} color={color} />;
    const BookOpen = ({ size = 22, color = "currentColor" }) => <MatIcon name="auto_stories" size={size} color={color} />;
    const User = ({ size = 22, color = "currentColor" }) => <MatIcon name="person" size={size} color={color} />;
    const Download = ({ size = 22, color = "currentColor" }) => <MatIcon name="download" size={size} color={color} />;
    const Pencil = ({ size = 22, color = "currentColor" }) => <MatIcon name="edit" size={size} color={color} />;
    const ChevronRight = ({ size = 22, color = "currentColor" }) => <MatIcon name="chevron_right" size={size} color={color} />;
    const Trash = ({ size = 22, color = "currentColor" }) => <MatIcon name="delete" size={size} color={color} />;
    const Filter = ({ size = 22, color = "currentColor" }) => <MatIcon name="filter_list" size={size} color={color} />;
    const LogOut = ({ size = 22, color = "currentColor" }) => <MatIcon name="logout" size={size} color={color} />;
    const Mail = ({ size = 22, color = "currentColor" }) => <MatIcon name="mail" size={size} color={color} />;
    const Lock = ({ size = 22, color = "currentColor" }) => <MatIcon name="lock" size={size} color={color} />;
    const Key = ({ size = 22, color = "currentColor" }) => <MatIcon name="key" size={size} color={color} />;

    // ── Constants ────────────────────────────────────────────────────────────
    const APP_LOGO_ICON = "./MSLogo_noBak.png";
    const COLORS = {
      bg: "#000000",
      surface: "#131315",
      surfaceAlt: "#1C1C1E",
      surfaceElevated: "#2C2C2E",
      surfaceHighest: "#3A3A3C",
      surfaceBright: "#39393B",
      border: "#3A3A3C",
      borderStrong: "rgba(0,196,188,0.3)",
      red: "#00C4BC",
      redLight: "rgba(0,196,188,0.12)",
      redGlow: "rgba(0,196,188,0.35)",
      teal: "#00C4BC",
      tealLight: "rgba(0,196,188,0.12)",
      tealGlow: "rgba(0,196,188,0.35)",
      gold: "#30D158",
      goldLight: "rgba(48,209,88,0.12)",
      green: "#30D158",
      greenLight: "rgba(48,209,88,0.12)",
      tertiary: "#30D158",
      tertiaryLight: "rgba(48,209,88,0.12)",
      muted: "rgba(255,255,255,0.06)",
      text: "#FFFFFF",
      textMuted: "#A1A1A1",
      textDim: "#6C6C6E",
    };

    const COLLECTION_KEY = "collection";
    const FAVORITES_KEY = "favorite_cards";
    const WISHLIST_KEY = "wishlist_cards";
    const AUTH_CACHE_KEY = "auth_profile_cache";
    const SYNC_META_KEY = "sync_meta";
    const IMPORT_HISTORY_KEY = "bulk_import_history";

    const CHASE_RARITIES = new Set([
      "Rare Holo","Rare Ultra","Rare Secret","Rare Rainbow","Rare Shining",
      "Amazing Rare","Illustration Rare","Special Illustration Rare",
      "Hyper Rare","ACE SPEC Rare","Rare Holo VMAX","Rare Holo VSTAR",
      "Rare Holo EX","Rare Holo GX","Trainer Gallery Rare Holo",
      "Double Rare","Ultra Rare","Shiny Rare","Shiny Ultra Rare",
    ]);

    // ── Storage Utilities ────────────────────────────────────────────────────
    async function loadLocalCollection() {
      try {
        const result = await window.storage.get(COLLECTION_KEY);
        return result
          ? JSON.parse(result.value)
          : { cards: {}, totalValue: 0, lastUpdated: null };
      } catch {
        return { cards: {}, totalValue: 0, lastUpdated: null };
      }
    }

    function recalculateCollectionTotals(collection) {
      collection.totalValue = Object.values(collection.cards)
        .reduce((sum, c) => sum + (c.marketPrice ?? 0) * (c.quantity ?? 0), 0);
      collection.lastUpdated = new Date().toISOString();
      return collection;
    }

    async function persistLocalCollection(collection) {
      recalculateCollectionTotals(collection);
      try { await window.storage.set(COLLECTION_KEY, JSON.stringify(collection)); } catch (e) { console.warn("Failed to persist collection:", e); }
      return collection;
    }

    async function loadLocalCardList(key) {
      try {
        const result = await window.storage.get(key);
        return result ? JSON.parse(result.value) : {};
      } catch {
        return {};
      }
    }

    async function saveLocalCardList(key, cards) {
      try { await window.storage.set(key, JSON.stringify(cards)); } catch (e) { console.warn("Failed to save card list:", e); }
      return cards;
    }

    function normalizeSavedCard(card) {
      if (!card) return null;
      return {
        id: card.id,
        name: card.name,
        setId: card.setId ?? card.set?.id ?? "",
        setName: card.setName ?? card.set?.name ?? "",
        number: card.number ?? "",
        rarity: card.rarity ?? "",
        imageUrl: card.imageUrl ?? card.images?.small ?? "",
        marketPrice: card.marketPrice ?? extractPrice(card),
        savedAt: new Date().toISOString(),
      };
    }

    async function addCardToList(key, card) {
      const list = await loadCardList(key);
      const nextCard = normalizeSavedCard(card);
      if (!nextCard?.id) return list;
      list[nextCard.id] = nextCard;
      return saveCardList(key, list);
    }

    function hasSupabaseConfig() {
      return Boolean(
        (window.MASTERSET_SUPABASE_URL || "").trim() &&
        (window.MASTERSET_SUPABASE_ANON_KEY || "").trim()
      );
    }

    function createSupabaseClient() {
      if (!hasSupabaseConfig() || !window.supabase?.createClient) return null;
      if (!window.__MASTERSET_SUPABASE_CLIENT) {
        window.__MASTERSET_SUPABASE_CLIENT = window.supabase.createClient(
          window.MASTERSET_SUPABASE_URL.trim(),
          window.MASTERSET_SUPABASE_ANON_KEY.trim()
        );
      }
      return window.__MASTERSET_SUPABASE_CLIENT;
    }

    async function cacheAuthProfile(profile) {
      try { await window.storage.set(AUTH_CACHE_KEY, JSON.stringify(profile || null)); } catch (e) { console.warn("Failed to cache auth profile:", e); }
    }

    async function loadCachedAuthProfile() {
      try {
        const result = await window.storage.get(AUTH_CACHE_KEY);
        return result ? JSON.parse(result.value) : null;
      } catch {
        return null;
      }
    }

    async function getAuthState() {
      const cachedProfile = await loadCachedAuthProfile();
      if (!hasSupabaseConfig()) {
        return { configured: false, session: null, user: null, profile: cachedProfile };
      }
      const client = createSupabaseClient();
      const { data, error } = await client.auth.getSession();
      if (error) throw error;
      const session = data?.session ?? null;
      const user = session?.user ?? null;
      const profile = user ? {
        id: user.id,
        email: user.email || "",
        provider: user.app_metadata?.provider || "email",
        displayName: user.user_metadata?.full_name || user.user_metadata?.name || user.email || "Signed In User",
      } : null;
      await cacheAuthProfile(profile);
      return { configured: true, session, user, profile };
    }

    async function signInWithApple() {
      // Use native ASAuthorizationController bridge when running in the iOS app
      if (window.NATIVE_APPLE_SIGNIN && window.webkit?.messageHandlers?.appleSignIn) {
        return new Promise((resolve, reject) => {
          window.handleAppleSignIn = async (identityToken) => {
            try {
              const client = createSupabaseClient();
              if (!client) throw new Error("AUTH_NOT_CONFIGURED");
              const { error } = await client.auth.signInWithIdToken({
                provider: "apple",
                token: identityToken,
              });
              if (error) throw error;
              resolve();
            } catch (err) {
              reject(err);
            }
          };
          window.handleAppleSignInError = (msg) => reject(new Error(msg));
          window.webkit.messageHandlers.appleSignIn.postMessage({});
        });
      }
      // Fallback: Supabase OAuth redirect (web / simulator without native bridge)
      const client = createSupabaseClient();
      if (!client) throw new Error("AUTH_NOT_CONFIGURED");
      const { error } = await client.auth.signInWithOAuth({
        provider: "apple",
        options: { redirectTo: window.location.href },
      });
      if (error) throw error;
    }

    async function signInWithEmail(email) {
      const client = createSupabaseClient();
      if (!client) throw new Error("AUTH_NOT_CONFIGURED");
      const { error } = await client.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href },
      });
      if (error) throw error;
    }

    async function signOutAuth() {
      const client = createSupabaseClient();
      if (!client) return;
      const { error } = await client.auth.signOut();
      if (error) throw error;
      await cacheAuthProfile(null);
    }

    async function updateSyncMeta(meta) {
      let current = {};
      try {
        const existing = await window.storage.get(SYNC_META_KEY);
        current = existing ? JSON.parse(existing.value) : {};
      } catch {}
      const nextMeta = { ...current, ...meta, lastSyncedAt: new Date().toISOString() };
      try { await window.storage.set(SYNC_META_KEY, JSON.stringify(nextMeta)); } catch (e) { console.warn("Failed to update sync meta:", e); }
      return nextMeta;
    }

    async function loadSyncMeta() {
      try {
        const result = await window.storage.get(SYNC_META_KEY);
        return result ? JSON.parse(result.value) : null;
      } catch {
        return null;
      }
    }

    async function loadImportHistory() {
      try {
        const result = await window.storage.get(IMPORT_HISTORY_KEY);
        const history = result ? JSON.parse(result.value) : [];
        return Array.isArray(history) ? history : [];
      } catch {
        return [];
      }
    }

    async function saveImportHistory(history) {
      const nextHistory = Array.isArray(history) ? history.slice(0, 8) : [];
      try { await window.storage.set(IMPORT_HISTORY_KEY, JSON.stringify(nextHistory)); } catch (e) { console.warn("Failed to save import history:", e); }
      return nextHistory;
    }

    async function appendImportHistory(entry) {
      const history = await loadImportHistory();
      const nextEntry = {
        timestamp: new Date().toISOString(),
        importedCount: Math.max(0, Number(entry?.importedCount) || 0),
      };
      if (entry?.unmatchedCount != null && Number(entry.unmatchedCount) > 0) {
        nextEntry.unmatchedCount = Math.max(0, Number(entry.unmatchedCount) || 0);
      }
      if (Array.isArray(entry?.appliedRows) && entry.appliedRows.length > 0) {
        nextEntry.appliedRows = entry.appliedRows
          .map(row => ({ cardId: String(row?.cardId || ""), quantity: Math.max(1, Number(row?.quantity) || 1), name: String(row?.name || "") }))
          .filter(row => row.cardId);
      }
      return saveImportHistory([nextEntry, ...history]);
    }

    async function popImportHistory() {
      const history = await loadImportHistory();
      if (history.length === 0) return { removedEntry: null, history: [] };
      const [removedEntry, ...nextHistory] = history;
      await saveImportHistory(nextHistory);
      return { removedEntry, history: nextHistory };
    }

    async function removeImportHistoryAt(index) {
      const history = await loadImportHistory();
      if (index < 0 || index >= history.length) return { removedEntry: null, history };
      const removedEntry = history[index];
      const nextHistory = history.filter((_, entryIndex) => entryIndex !== index);
      await saveImportHistory(nextHistory);
      return { removedEntry, history: nextHistory };
    }

    async function getCloudContext() {
      const authState = await getAuthState();
      if (!authState?.configured || !authState?.user) return null;
      const client = createSupabaseClient();

    async function loadCollectionFromCloud() {
      const cloud = await getCloudContext();
      if (!cloud) return null;
      const { data, error } = await cloud.client.from("owned_cards").select("*").eq("user_id", cloud.user.id);
      if (error) throw error;
      const collection = { cards: {}, totalValue: 0, lastUpdated: null };
      (data || []).forEach(row => { const card = rowToCollectionCard(row); collection.cards[card.id] = card; });
      recalculateCollectionTotals(collection);
      await persistLocalCollection(collection);
      await updateSyncMeta({ collectionMode: "cloud" });
      return collection;
    }

    async function saveCollectionToCloud(collection) {
      const cloud = await getCloudContext();
      if (!cloud) return persistLocalCollection(collection);
      const rows = Object.values(collection.cards).map(card => collectionCardToRow(card, cloud.user.id));
      const { error: deleteError } = await cloud.client.from("owned_cards").delete().eq("user_id", cloud.user.id);
      if (deleteError) throw deleteError;
      if (rows.length > 0) {
        const { error: upsertError } = await cloud.client.from("owned_cards").upsert(rows, { onConflict: "user_id,card_id" });
        if (upsertError) throw upsertError;
      }
      await persistLocalCollection(collection);
      await updateSyncMeta({ collectionMode: "cloud" });
      return collection;
    }

    async function loadCardListFromCloud(key) {
      const table = tableNameForListKey(key);
      const cloud = await getCloudContext();
      if (!table || !cloud) return null;
      const { data, error } = await cloud.client.from(table).select("*").eq("user_id", cloud.user.id);
      if (error) throw error;
      const cards = {};
      (data || []).forEach(row => { const card = rowToSavedCard(row); cards[card.id] = card; });
      await saveLocalCardList(key, cards);
      await updateSyncMeta({ [`${table}Mode`]: "cloud" });
      return cards;
    }

    async function saveCardListToCloud(key, cards) {
      const table = tableNameForListKey(key);
      const cloud = await getCloudContext();
      if (!table || !cloud) return saveLocalCardList(key, cards);
      const rows = Object.values(cards).map(card => savedCardToRow(card, cloud.user.id));
      const { error: deleteError } = await cloud.client.from(table).delete().eq("user_id", cloud.user.id);
      if (deleteError) throw deleteError;
      if (rows.length > 0) {
        const { error: upsertError } = await cloud.client.from(table).upsert(rows, { onConflict: "user_id,card_id" });
        if (upsertError) throw upsertError;
      }
      await saveLocalCardList(key, cards);
      await updateSyncMeta({ [`${table}Mode`]: "cloud" });
      return cards;
    }

    async function saveCard(tcgCard, marketPrice) {
      const collection = await loadCollection();
      addCardToCollectionState(collection, tcgCard, marketPrice, 1);
      return persistCollection(collection);
    }

    function addCardToCollectionState(collection, tcgCard, marketPrice, quantity = 1) {
      const safeQuantity = Math.max(1, Number(quantity) || 1);
      const existing = collection.cards[tcgCard.id];
      if (existing) {
        existing.quantity = (existing.quantity ?? 0) + safeQuantity;
        if (marketPrice != null) existing.marketPrice = marketPrice;
        if (!existing.imageUrl && tcgCard.images?.small) existing.imageUrl = tcgCard.images.small;
        existing.scannedAt = new Date().toISOString();
        return collection;
      }
      collection.cards[tcgCard.id] = {
        id: tcgCard.id, name: tcgCard.name, setId: tcgCard.set?.id ?? "",
        setName: tcgCard.set?.name ?? "", number: tcgCard.number,
        rarity: tcgCard.rarity ?? "", imageUrl: tcgCard.images?.small ?? "",
        marketPrice, scannedAt: new Date().toISOString(), quantity: safeQuantity,
      };
      return collection;
    }

    async function importCardsToCollection(matches) {
      const collection = await loadCollection();
      const appliedRows = [];
      matches.forEach(match => {
        if (!match?.card) return;
        const quantity = Math.max(1, Number(match.quantity) || 1);
        addCardToCollectionState(collection, match.card, extractPrice(match.card), quantity);
        appliedRows.push({ cardId: match.card.id, quantity, name: match.card.name });
      });
      const updatedCollection = await persistCollection(collection);
      return { collection: updatedCollection, appliedRows };
    }

    async function undoImportedCards(appliedRows) {
      if (!Array.isArray(appliedRows) || appliedRows.length === 0) return loadCollection();
      const collection = await loadCollection();
      appliedRows.forEach(row => {
        const cardId = row?.cardId;
        const quantity = Math.max(1, Number(row?.quantity) || 1);
        if (!cardId || !collection.cards[cardId]) return;
        const nextQuantity = (collection.cards[cardId].quantity ?? 0) - quantity;
        if (nextQuantity <= 0) delete collection.cards[cardId];
        else collection.cards[cardId].quantity = nextQuantity;
      });
      return persistCollection(collection);
    }

    async function persistCollection(collection) {
      recalculateCollectionTotals(collection);
      try { const cloud = await getCloudContext(); if (cloud) return saveCollectionToCloud(collection); } catch {}
      return persistLocalCollection(collection);
    }

    async function refreshSetPrices(setId, apiCards, collection) {
      if (!collection?.cards) return collection;
      const ownedInSet = Object.values(collection.cards).filter(c => c.setId === setId);
      if (ownedInSet.length === 0) return collection;
      const priceMap = {};
      apiCards.forEach(c => { const p = extractPrice(c); if (p != null) priceMap[c.id] = p; });
      let changed = false;
      for (const card of ownedInSet) {
        const fresh = priceMap[card.id];
        if (fresh != null && (fresh !== card.marketPrice || !card.priceUpdatedAt)) {
          collection.cards[card.id] = { ...collection.cards[card.id], marketPrice: fresh, priceUpdatedAt: new Date().toISOString() };
          changed = true;
        }
      }
      if (!changed) return collection;
      return persistCollection(collection);
    }

    async function adjustCardQuantity(cardId, delta) {
      const collection = await loadCollection();
      const existing = collection.cards[cardId];
      if (!existing) return collection;
      const nextQuantity = (existing.quantity ?? 0) + delta;
      if (nextQuantity <= 0) delete collection.cards[cardId];
      else existing.quantity = nextQuantity;
      return persistCollection(collection);
    }

    async function removeCardFromCollection(cardId) {
      const collection = await loadCollection();
      if (!collection.cards[cardId]) return collection;
      delete collection.cards[cardId];
      return persistCollection(collection);
    }

    // Detect likely card language from script used in name/setName
    function detectCardLanguage(name, setName) {
      const text = (name || "") + " " + (setName || "");
      if (/[\u3040-\u309F\u30A0-\u30FF]/.test(text)) return ["ja"];           // Hiragana/Katakana → Japanese
      if (/[\uAC00-\uD7AF\u1100-\u11FF]/.test(text)) return ["ko"];            // Hangul → Korean
      if (/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(text)) return ["zh-tw", "zh-cn", "ja"]; // CJK → Chinese/Japanese
      if (/[\u0E00-\u0E7F]/.test(text)) return ["th"];                         // Thai script → Thai
      return ["fr", "de", "es", "it", "pt", "id"];                             // Latin-script → European/other
    }

    // Lookup a card on TCGdex when pokemontcg.io returns nothing (non-English cards)
    async function fetchTcgdexCardByNameAndSet(cardName, setName, cardNumber) {
      const langsToTry = detectCardLanguage(cardName, setName);
      const normalizedNumber = (cardNumber || "").split("/")[0].replace(/^0+/, "");
      for (const lang of langsToTry) {
        try {
          const sets = await fetchTcgdexSets(lang);
          const searchTerm = (setName || "").toLowerCase().trim();
          const matchingSet = searchTerm
            ? sets.find(s => {
                const sn = s.name.toLowerCase();
                return sn === searchTerm || sn.includes(searchTerm) || searchTerm.includes(sn);
              })
            : null;
          if (!matchingSet) continue;
          const cards = await fetchTcgdexSetCards(lang, matchingSet._tcgdexId, matchingSet.id);
          const card = cards.find(c => {
            const cn = String(c.number || "").replace(/^0+/, "");
            return cn === normalizedNumber || c.number === cardNumber;
          });
          if (card) return card;
        } catch (e) { /* try next language */ }
      }
      return null;
    }

    async function fetchCardByNameAndSet(name, setName, fallbackNumber) {
      const safeName = (name || "").replace(/"/g, '\\"');
      const safeSetName = (setName || "").replace(/"/g, '\\"');
      const encodedQ = encodeURIComponent(`name:"${safeName}" set.name:"${safeSetName}"`);
      const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodedQ}&pageSize=10`);
      if (res.status === 429) throw new Error("RATE_LIMITED");
      if (!res.ok) throw new Error(`TCG_HTTP_${res.status}`);
      const data = await res.json();
      const cards = data.data ?? [];
      if (cards.length === 0) {
        const fallbackQ = encodeURIComponent(`name:"${safeName}"`);
        const fallbackRes = await fetch(`https://api.pokemontcg.io/v2/cards?q=${fallbackQ}&pageSize=20`);
        if (fallbackRes.status === 429) throw new Error("RATE_LIMITED");
        if (!fallbackRes.ok) return null;
        const fallbackData = await fallbackRes.json();
        return fallbackData.data?.[0] ?? null;
      }
      if (cards.length === 1) return cards[0];
      if (fallbackNumber) {
        const numOnly = fallbackNumber.split("/")[0].replace(/^0+/, "");
        const match = cards.find(c => c.number.replace(/^0+/, "") === numOnly);
        if (match) return match;
      }
      return cards[0];
    }

    async function searchCardsByName(name, setName = "") {
      const safeName = (name || "").replace(/"/g, '\\"');
      const parts = [`name:"${safeName}"`];
      if (setName.trim()) { const safeSetName = setName.trim().replace(/"/g, '\\"'); parts.push(`set.name:"${safeSetName}"`); }
      const encodedQ = encodeURIComponent(parts.join(" "));
      let allCards = []; let page = 1;
      while (true) {
        const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodedQ}&orderBy=set.releaseDate,number&pageSize=250&page=${page}`);
        if (res.status === 429) throw new Error("RATE_LIMITED");
        if (!res.ok) throw new Error(`TCG_HTTP_${res.status}`);
        const data = await res.json();
        const batch = data.data ?? [];
        allCards = allCards.concat(batch);
        if (allCards.length >= (data.totalCount ?? 0) || batch.length === 0) break;
        page += 1;
      }
      return allCards;
    }

    }

    function parseImportQuantity(value) {
      const parsed = parseInt(String(value ?? "").trim(), 10);
      return Number.isFinite(parsed) && parsed > 0 ? Math.min(parsed, 99) : 1;
    }

    function parseImportLine(line) {
      const trimmed = line.trim();
      if (!trimmed) return null;
      const delimiter = trimmed.includes("\t") ? "\t" : trimmed.includes("|") ? "|" : ",";
      const parts = trimmed.split(delimiter).map(part => part.trim().replace(/^"|"$/g, ""));
      if (parts.length === 0) return null;
      const joinedLower = parts.join(" ").toLowerCase();
      if (joinedLower.includes("name") && joinedLower.includes("set") && joinedLower.includes("quantity")) return null;
      const [name = "", setName = "", number = "", quantity = "1"] = parts;
      if (!name) return null;
      return { rawLine: trimmed, name, setName, number, quantity: parseImportQuantity(quantity) };
    }

    function parseBulkImportText(text) {
      return String(text || "").split(/\r?\n/).map(parseImportLine).filter(Boolean);
    }

    function formatImportRow(row) {
      return [row?.name ?? "", row?.setName ?? "", row?.number ?? "", row?.quantity ?? 1].join(", ");
    }

    async function resolveImportRow(row) {
      if (!row?.name) return { ...row, status: "unmatched", reason: "Missing card name", card: null };
      try {
        let card = null;
        if (row.setName) {
          card = await fetchCardByNameAndSet(row.name, row.setName, row.number);
        } else {
          const searchResults = await searchCardsByName(row.name);
          if (row.number) {
            const normalizedNumber = row.number.split("/")[0].replace(/^0+/, "");
            card = searchResults.find(candidate => candidate.number.replace(/^0+/, "") === normalizedNumber) || null;
          }
          card = card || searchResults[0] || null;
        }
        if (!card) return { ...row, status: "unmatched", reason: "No matching card found", card: null };
        return { ...row, card, status: row.setName || row.number ? "matched" : "best_guess", reason: row.setName || row.number ? "Matched to card" : "Matched by name across all sets" };
      } catch (error) {
        const message = String(error?.message || "");
        return { ...row, card: null, status: "error", reason: message.includes("RATE_LIMITED") ? "Rate limited while matching cards" : "Could not match this row" };
      }
    }

    async function resolveBulkImportRows(rows) {
      const results = [];
      for (const row of rows) { results.push(await resolveImportRow(row)); }
      return results;
    }

    function decorateImportRowsWithCollection(rows, collection) {
      const ownedMap = collection?.cards ?? {};
      const queuedByCardId = {};
      return rows.map(row => {
        if (!row?.card) return { ...row, shouldImport: false, ownedQuantity: 0, projectedQuantity: 0, importQuantity: parseImportQuantity(row?.quantity), isAlreadyOwned: false, isDuplicateInImport: false };
        const importQuantity = parseImportQuantity(row.quantity);
        const cardId = row.card.id;
        const ownedQuantity = ownedMap[cardId]?.quantity ?? 0;
        const alreadyQueued = queuedByCardId[cardId] ?? 0;
        queuedByCardId[cardId] = alreadyQueued + importQuantity;
        return { ...row, shouldImport: row.shouldImport ?? true, ownedQuantity, projectedQuantity: ownedQuantity + alreadyQueued + importQuantity, importQuantity, isAlreadyOwned: ownedQuantity > 0, isDuplicateInImport: alreadyQueued > 0 };
      });
    }

    function captureFrame(videoEl) {
      const w = videoEl.videoWidth; const h = videoEl.videoHeight;
      if (!w || !h) throw new Error("Camera not ready — try again");
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Could not capture frame");
      ctx.drawImage(videoEl, 0, 0);
      return canvas.toDataURL("image/jpeg", 0.85).split(",")[1];
    }

    // ── ScanScreen ────────────────────────────────────────────────────────────
    function ScanScreen({ navigate, goBack, embedded = false, visible = true }) {
      const videoRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [cameraError, setCameraError] = useState(null);
      const [cameraReady, setCameraReady] = useState(false);
      const [identifying, setIdentifying] = useState(false);
      const [identifyError, setIdentifyError] = useState(null);
      const [toast, setToast] = useState(null);
      const [capturedFrame, setCapturedFrame] = useState(null);
      const showToast = (message, type = "error") => setToast({ message, type });
      const mountedRef = useRef(true);
      const identifyingRef = useRef(false);
      const prevVisibleRef = useRef(true);

      useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);

      // When returning from an overlay (confirm screen), clear frozen frame — stream is still alive
      useEffect(() => {
        if (visible && !prevVisibleRef.current) {
          setCapturedFrame(null);
        }
        prevVisibleRef.current = visible;
      }, [visible]);

      const startCamera = useCallback(async () => {
        try {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } } });
          if (!mountedRef.current) { s.getTracks().forEach(t => t.stop()); return; }
          setStream(s);
          if (videoRef.current) {
            videoRef.current.srcObject = s;
            await videoRef.current.play();
            if (mountedRef.current) setCameraReady(true);
          }
        } catch (e) {
          if (!mountedRef.current) return;
          const msg = e.name === "NotAllowedError" ? "Camera permission denied" : e.name === "NotFoundError" ? "No camera found" : "Camera unavailable";
          setCameraError(msg);
        }
      }, []);

      useEffect(() => {
        startCamera();
        return () => {
          setStream(s => { if (s) s.getTracks().forEach(t => t.stop()); return null; });
        };
      }, [startCamera]);

      async function doIdentify(base64) {
        if (identifyingRef.current) return;
        identifyingRef.current = true;
        setIdentifying(true); setIdentifyError(null);

        // Safety-net: force reset UI if nothing resolves within 35 s
        const safetyTimer = setTimeout(() => {
          if (!mountedRef.current) return;
          identifyingRef.current = false;
          setIdentifying(false);
          setCapturedFrame(null);
          const msg = "Analysis timed out — please try again";
          setIdentifyError(msg); showToast(msg, "error");
          setStream(s => { if (s) s.getTracks().forEach(t => t.stop()); return null; });
          setCameraReady(false);
          startCamera();
        }, 35000);

        try {
          const visionResult = await identifyCardWithVision(base64);
          if (mountedRef.current) navigate("confirm", { visionResult, capturedBase64: base64 });
        } catch (e) {
          if (!mountedRef.current) return;
          const msg = e.message.includes("NO_SCAN_BACKEND") ? "Card scanning is coming soon — stay tuned!"
            : e.message.includes("RATE_LIMITED") ? "Too many scans — try again in a moment"
            : e.message.includes("TIMEOUT") ? "Analysis timed out — please try again"
            : e.message.includes("401") || e.message.includes("403") ? "Scan service unavailable — try again later"
            : "Couldn't identify card — try better lighting or a clearer angle";
          setIdentifyError(msg); showToast(msg, "error");
          setCapturedFrame(null);
          setStream(s => { if (s) s.getTracks().forEach(t => t.stop()); return null; });
          setCameraReady(false);
          startCamera();
        } finally {
          clearTimeout(safetyTimer);
          identifyingRef.current = false;
          if (mountedRef.current) setIdentifying(false);
        }
      }

      function freezeAndIdentify(base64) {
        // Keep stream alive — overlay will hide us, stream stays running for when we return
        setCapturedFrame(base64);
        doIdentify(base64);
      }

      function handleCapture() {
        if (!videoRef.current || !cameraReady || identifyingRef.current) return;
        try { freezeAndIdentify(captureFrame(videoRef.current)); } catch (e) { console.error("Capture error:", e); }
      }

      function handleFileUpload(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const base64 = (ev.target.result || "").split(",")[1];
          if (!base64) { showToast("Could not read image — please try another file", "error"); return; }
          doIdentify(base64);
        };
        reader.onerror = () => showToast("Could not read that file", "error");
        reader.readAsDataURL(file);
      }


      return (
        <div style={{ height: "100vh", background: "#000000", color: "#FFFFFF", display: "flex", flexDirection: "column" }}>
          {/* Header overlay */}
          <div className="safe-t16" style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "16px 20px", background: "linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%)", display: "flex", alignItems: "center", gap: 12, flexShrink: 0, zIndex: 5 }}>
            <button onClick={() => { if (stream) stream.getTracks().forEach(t => t.stop()); (goBack || (() => navigate("home")))(); }}
              style={{ background: "rgba(28,28,30,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", border: "none", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, padding: "10px 16px", borderRadius: 9999, minHeight: 44, fontWeight: 700, fontSize: 13 }}>
              <MatIcon name="arrow_back" size={18} color="#fff" />
            </button>
            <span style={{ fontSize: 18, fontWeight: 900, color: "#fff", letterSpacing: "-0.02em", textTransform: "uppercase" }}>Scan Card</span>
          </div>

          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {!cameraError ? (
              <>
                <div style={{ position: "relative", background: "#000", flex: 1, overflow: "hidden" }}>
                  <video ref={videoRef} playsInline muted autoPlay style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                  {capturedFrame && (
                    <img src={`data:image/jpeg;base64,${capturedFrame}`} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", display: "block" }} alt="" />
                  )}
                  {cameraReady && (
                    <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                      <div style={{ position: "relative", width: "62%", aspectRatio: "2.5 / 3.5" }}>
                        <div style={{ position: "absolute", inset: 0, boxShadow: "0 0 0 9999px rgba(0,0,0,0.45)", borderRadius: 12 }} />
                        <div style={{ position: "absolute", inset: 0, border: "2px solid rgba(255,255,255,0.2)", borderRadius: 12 }} />
                        {[["0","0","borderTop","borderLeft"],["0","auto","borderTop","borderRight"],["auto","0","borderBottom","borderLeft"],["auto","auto","borderBottom","borderRight"]].map(([t,r,bv,bh],i) => (
                          <div key={i} style={{ position: "absolute", top: t !== "auto" ? -1 : "auto", right: r !== "auto" ? -1 : "auto", bottom: t === "auto" ? -1 : "auto", left: r === "auto" ? -1 : "auto", width: 24, height: 24,
                            [bv]: "3px solid rgba(255,255,255,0.6)",
                            [bh]: "3px solid rgba(255,255,255,0.6)",
                            borderRadius: i === 0 ? "10px 0 0 0" : i === 1 ? "0 10px 0 0" : i === 2 ? "0 0 0 10px" : "0 0 10px 0" }} />
                        ))}
                      </div>
                    </div>
                  )}
                  {!cameraReady && !capturedFrame && (
                    <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.9)" }}>
                      <LoadingSpinner label="Starting camera…" />
                    </div>
                  )}
                </div>
                <div style={{ padding: "20px 20px 28px", background: "rgba(19,19,21,0.98)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", display: "flex", flexDirection: "column", alignItems: "center", gap: 14, flexShrink: 0 }}>
                  {identifying ? <LoadingSpinner label="Analyzing card…" /> : (
                    <>
                      <button onClick={handleCapture} disabled={!cameraReady} style={{
                        width: 72, height: 72, borderRadius: "50%", background: cameraReady ? "#00C4BC" : "#2C2C2E",
                        border: "none", cursor: cameraReady ? "pointer" : "not-allowed",
                        opacity: cameraReady ? 1 : 0.5, display: "flex", alignItems: "center", justifyContent: "center",
                        boxShadow: cameraReady ? "0 4px 20px rgba(0,196,188,0.4)" : "none",
                      }}>
                        <MatIcon name="photo_camera" size={28} color="#fff" />
                      </button>
                      <span style={{ fontSize: 13, color: "#A1A1A1", fontWeight: 600, letterSpacing: "0.02em" }}>{cameraReady ? "Tap to scan" : "Starting camera…"}</span>
                      <div style={{ display: "flex", gap: 12 }}>
                        <label style={{ display: "flex", alignItems: "center", gap: 6, color: "#A1A1A1", fontSize: 13, cursor: "pointer", padding: "10px 18px", background: "#1C1C1E", border: "none", borderRadius: 9999, fontWeight: 700, minHeight: 44 }}>
                          <MatIcon name="upload" size={16} color="#A1A1A1" /> Upload
                          <input type="file" accept="image/*" onChange={handleFileUpload} style={{ display: "none" }} />
                        </label>
                        <button onClick={() => navigate("manual")} style={{ background: "#1C1C1E", border: "none", color: "#A1A1A1", fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, padding: "10px 18px", borderRadius: 9999, fontWeight: 700, minHeight: 44 }}>
                          <MatIcon name="edit" size={16} color="#A1A1A1" /> Manual
                        </button>
                      </div>
                    </>
                  )}
                  {identifyError && !identifying && (
                    <div style={{ background: "rgba(60,0,0,0.8)", borderRadius: 12, padding: "10px 14px", color: "#fca5a5", fontSize: 13, textAlign: "center" }}>{identifyError}</div>
                  )}
                </div>
              </>
            ) : (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, gap: 24, background: "#000000" }}>
                <div style={{ width: 88, height: 88, background: "#1C1C1E", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <MatIcon name="photo_camera" size={40} color="#A1A1A1" />
                </div>
                <div style={{ textAlign: "center" }}>
                  <p style={{ fontSize: 20, fontWeight: 900, marginBottom: 8, letterSpacing: "-0.02em", textTransform: "uppercase" }}>Camera Unavailable</p>
                  <p style={{ color: "#A1A1A1", fontSize: 14, lineHeight: 1.6 }}>{cameraError}</p>
                  <p style={{ color: "#A1A1A1", fontSize: 14, lineHeight: 1.6 }}>Upload a photo of your card instead</p>
                </div>
                {identifying ? <LoadingSpinner label="Analyzing card…" /> : (
                  <>
                    <label style={{ display: "flex", alignItems: "center", gap: 10, background: "#00C4BC", color: "#fff", padding: "15px 32px", borderRadius: 9999, fontWeight: 800, fontSize: 15, cursor: "pointer", minHeight: 52, boxShadow: "0 6px 24px rgba(0,196,188,0.4)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                      <MatIcon name="upload" size={20} color="#fff" /> Choose Photo
                      <input type="file" accept="image/*" capture="environment" onChange={handleFileUpload} style={{ display: "none" }} />
                    </label>
                    <button onClick={() => navigate("manual")} style={{ background: "none", border: "1px solid #3A3A3C", color: "#A1A1A1", padding: "12px 24px", borderRadius: 9999, fontSize: 14, cursor: "pointer", fontWeight: 700, minHeight: 44 }}>
                      Enter Manually Instead
                    </button>
                    {identifyError && <div style={{ background: "rgba(60,0,0,0.6)", borderRadius: 12, padding: "10px 14px", color: "#fca5a5", fontSize: 13, textAlign: "center" }}>{identifyError}</div>}
                  </>
                )}
              </div>
            )}
          </div>
          {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}
        </div>
      );
    }

    // ── ConfirmScreen ─────────────────────────────────────────────────────────
    function ConfirmScreen({ visionResult, capturedBase64, navigate, goBack }) {
      const [tcgCard, setTcgCard] = useState(null);
      const [allVersions, setAllVersions] = useState([]);
      const [loadingCard, setLoadingCard] = useState(true);
      const [fetchError, setFetchError] = useState(null);
      const [collection, setCollection] = useState(null);
      const [saving, setSaving] = useState(false);
      const [saveSuccess, setSaveSuccess] = useState(false);
      const [toast, setToast] = useState(null);
      const [name, setName] = useState(visionResult?.name ?? "");
      const showToast = (message, type = "info") => setToast({ message, type });
      const pickerRef = useRef(null);

      // Scroll picker to the pre-selected card whenever the selection or version list changes
      useEffect(() => {
        if (!pickerRef.current || !tcgCard || allVersions.length < 2) return;
        const idx = allVersions.findIndex(c => c.id === tcgCard.id);
        if (idx < 0) return;
        const CARD_W = 80, GAP = 10;
        const containerW = pickerRef.current.offsetWidth;
        const scrollLeft = idx * (CARD_W + GAP) - (containerW / 2 - CARD_W / 2);
        pickerRef.current.scrollTo({ left: Math.max(0, scrollLeft), behavior: "smooth" });
      }, [tcgCard?.id, allVersions]);

      useEffect(() => {
        let mounted = true;
        async function init() {
          const col = await loadCollection();
          if (!mounted) return;
          setCollection(col);
          await lookupCard(visionResult?.name, visionResult?.number);
        }
        init();
        return () => { mounted = false; };
      }, []);

      async function lookupCard(cardName, cardNumber) {
        setLoadingCard(true); setFetchError(null); setAllVersions([]);
        try {
          const cards = await searchCardsByName(cardName);
          if (!cards.length) {
            setFetchError("No cards found — try editing the name below");
            setTcgCard(null);
            return;
          }
          setAllVersions(cards);
          // Pre-select best match by number, otherwise first result
          const numOnly = (cardNumber || "").split("/")[0].replace(/^0+/, "");
          const best = numOnly
            ? cards.find(c => c.number.replace(/^0+/, "") === numOnly) ?? cards[0]
            : cards[0];
          setTcgCard(best);
        } catch (e) {
          if (e.message === "RATE_LIMITED") { setFetchError("Rate limited — try again in a moment"); showToast("Too many requests — try again in a moment", "warning"); }
          else setFetchError("Could not fetch card data");
        } finally { setLoadingCard(false); }
      }

      function handleRetryLookup() { lookupCard(name, ""); }

      const marketPrice = extractPrice(tcgCard);
      const existingCard = collection?.cards?.[tcgCard?.id];
      const isDuplicate = !!existingCard;
      const currentTotal = collection?.totalValue ?? 0;
      const newTotal = currentTotal + (marketPrice ?? 0);

      async function handleAddToCollection() {
        if (!tcgCard) return;
        setSaving(true);
        try {
          const updated = await saveCard(tcgCard, marketPrice);
          setCollection(updated);
          setSaveSuccess(true);
          const newQty = updated.cards?.[tcgCard.id]?.quantity ?? 1;
          showToast(isDuplicate ? `Added another copy! You now have ${newQty}×` : "Card added to collection!", "info");
          setTimeout(() => navigate("scan"), 1200);
        } catch { showToast("Failed to save card — please try again", "error"); }
        finally { setSaving(false); }
      }

      const inputStyle = { background: "#1C1C1E", border: "1px solid #3A3A3C", borderRadius: 12, color: "#FFFFFF", padding: "12px 14px", fontSize: 16, width: "100%", transition: "border-color 0.15s ease-out" };
      const labelStyle = { fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 6, display: "block", fontWeight: 700 };

      return (
        <div style={{ minHeight: "100vh", background: "#000000", color: "#FFFFFF", paddingBottom: 110 }}>
          {/* Header */}
          <div className="safe-t16" style={{ padding: "16px 20px", background: "rgba(28,28,30,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
            <div>
              <div style={{ fontSize: 10, color: "#00C4BC", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 2 }}>Step 2 of 2</div>
              <span style={{ fontSize: 22, fontWeight: 900, letterSpacing: "-0.03em", textTransform: "uppercase" }}>Confirm Card</span>
            </div>
            <button onClick={goBack || (() => navigate("scan"))} style={{ background: "#1C1C1E", border: "none", color: "#A1A1A1", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontSize: 14, padding: "10px 16px", borderRadius: 9999, minHeight: 44, fontWeight: 700 }}>
              <MatIcon name="arrow_back" size={16} color="#A1A1A1" /> Back
            </button>
          </div>

          <div style={{ padding: "24px 20px 0" }} className="fade-in">
            {/* Glow + Card image hero */}
            {tcgCard?.images?.small && (
              <div style={{ position: "relative", display: "flex", justifyContent: "center", marginBottom: 24 }}>
                <div style={{ position: "absolute", inset: 0, background: "rgba(0,196,188,0.15)", filter: "blur(60px)", borderRadius: "50%", pointerEvents: "none" }} />
                <div className={saveSuccess ? "card-pop" : "fade-in-scale"} style={{ position: "relative" }}>
                  <img src={tcgCard.images.small} alt={tcgCard.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0.3"; }} style={{ width: 140, borderRadius: 12, border: `2px solid ${saveSuccess ? "#30D158" : "rgba(0,196,188,0.3)"}`, boxShadow: "0 24px 48px rgba(0,0,0,0.6)", transition: "border-color 0.3s" }} />
                  {CHASE_RARITIES.has(tcgCard.rarity) && (
                    <div style={{ position: "absolute", top: 6, right: 6, background: "#00C4BC", borderRadius: "50%", width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <MatIcon name="star" size={13} color="#fff" filled={true} />
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Card name + rarity chips */}
            {tcgCard && !loadingCard && (
              <div style={{ textAlign: "center", marginBottom: 24 }}>
                <div style={{ fontSize: 10, color: "#00C4BC", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 6 }}>
                  {tcgCard.set?.name} — {tcgCard.number}
                </div>
                <div style={{ fontSize: 40, fontWeight: 900, letterSpacing: "-0.04em", lineHeight: 1, marginBottom: 12 }}>{tcgCard.name}</div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
                  {tcgCard.rarity && (
                    <span style={{ padding: "4px 14px", background: CHASE_RARITIES.has(tcgCard.rarity) ? "rgba(0,196,188,0.12)" : "#1C1C1E", border: `1px solid ${CHASE_RARITIES.has(tcgCard.rarity) ? "rgba(0,196,188,0.4)" : "#3A3A3C"}`, borderRadius: 9999, fontSize: 11, fontWeight: 700, color: CHASE_RARITIES.has(tcgCard.rarity) ? "#00C4BC" : "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.08em" }}>
                      {tcgCard.rarity}
                    </span>
                  )}
                  {tcgCard.subtypes?.map(st => (
                    <span key={st} style={{ padding: "4px 14px", background: "#1C1C1E", borderRadius: 9999, fontSize: 11, fontWeight: 700, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.08em" }}>{st}</span>
                  ))}
                </div>
              </div>
            )}

            {loadingCard && <div style={{ marginBottom: 20 }}><LoadingSpinner label="Looking up card…" /></div>}

            {/* Version picker */}
            {allVersions.length > 1 && !loadingCard && (
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 10, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 10 }}>
                  {allVersions.length} versions — tap the one you have
                </div>
                <div ref={pickerRef} style={{ overflowX: "auto", display: "flex", gap: 10, paddingBottom: 4, scrollSnapType: "x mandatory" }}>
                  {allVersions.map(card => {
                    const isSelected = tcgCard?.id === card.id;
                    return (
                      <div key={card.id} onClick={() => setTcgCard(card)} style={{
                        flexShrink: 0, scrollSnapAlign: "start", cursor: "pointer",
                        position: "relative", borderRadius: 10,
                        outline: isSelected ? "2px solid #00C4BC" : "2px solid transparent",
                        outlineOffset: 2, transition: "outline-color 0.15s",
                      }}>
                        <img src={card.images?.small} alt={card.name} loading="lazy"
                          onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0.3"; }}
                          style={{ width: 80, borderRadius: 8, display: "block" }} />
                        <div style={{ fontSize: 9, color: isSelected ? "#00C4BC" : "#6B7280", textAlign: "center", marginTop: 4, fontWeight: 700, maxWidth: 80, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>
                          {card.set?.name}
                        </div>
                        {isSelected && (
                          <div style={{ position: "absolute", top: 4, right: 4, background: "#00C4BC", borderRadius: "50%", width: 18, height: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <MatIcon name="check" size={11} color="#fff" />
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {visionResult?.confidence && <div style={{ marginBottom: 16 }}><ConfidenceBadge confidence={visionResult.confidence} /></div>}

            {isDuplicate && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, background: "rgba(48,209,88,0.08)", border: "1px solid rgba(48,209,88,0.3)", borderRadius: 12, padding: "10px 14px", color: "#30D158", fontSize: 13, marginBottom: 16 }}>
                <MatIcon name="warning" size={16} color="#30D158" />
                <span>You already have {existingCard.quantity}× this card. Adding will make {existingCard.quantity + 1}×.</span>
              </div>
            )}

            {/* Market Value */}
            {!loadingCard && (
              <div style={{ background: "#1C1C1E", borderRadius: 24, padding: "24px", marginBottom: 16, textAlign: "center" }}>
                <div style={{ fontSize: 10, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.2em", marginBottom: 8 }}>Market Value</div>
                <div style={{ fontSize: 52, fontWeight: 900, letterSpacing: "-0.04em", color: marketPrice != null ? "#30D158" : "#A1A1A1", lineHeight: 1 }}>
                  {formatPrice(marketPrice)}
                </div>
                <div style={{ marginTop: 12, fontSize: 13, color: "#A1A1A1" }}>
                  Collection after adding: <span style={{ color: "#FFFFFF", fontWeight: 700 }}>{formatPrice(newTotal)}</span>
                </div>
              </div>
            )}

            {/* Name search fallback */}
            <div style={{ background: "#131315", borderRadius: 24, padding: 20, marginBottom: 16 }}>
              <div style={{ fontSize: 10, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 16 }}>Wrong card? Search by name</div>
              <div style={{ display: "flex", gap: 10 }}>
                <input style={{ ...inputStyle, flex: 1 }} value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && handleRetryLookup()} placeholder="Card name…" />
                <button onClick={handleRetryLookup} disabled={loadingCard || !name.trim()} style={{ padding: "12px 16px", minHeight: 44, background: loadingCard || !name.trim() ? "#2C2C2E" : "#00C4BC", border: "none", borderRadius: 12, color: "#fff", fontWeight: 700, cursor: loadingCard || !name.trim() ? "not-allowed" : "pointer", fontSize: 14, flexShrink: 0, opacity: loadingCard || !name.trim() ? 0.5 : 1 }}>
                  {loadingCard ? "…" : "Search"}
                </button>
              </div>
              {fetchError && <div style={{ marginTop: 10, color: "#fca5a5", fontSize: 13 }}>{fetchError}</div>}
            </div>
          </div>

          {/* Fixed action bar */}
          <div className="safe-b16" style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "16px 20px", background: "rgba(28,28,30,0.9)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", display: "flex", gap: 10 }}>
            <button onClick={goBack || (() => navigate("scan"))} style={{ flex: 1, padding: "15px 12px", minHeight: 52, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#A1A1A1", fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              <MatIcon name="close" size={18} color="#A1A1A1" /> Discard
            </button>
            <button onClick={handleAddToCollection} disabled={!tcgCard || saving} style={{ flex: 2, padding: "15px 12px", minHeight: 52, background: !tcgCard || saving ? "#3A3A3C" : "#00C4BC", border: "none", borderRadius: 9999, color: "#fff", fontSize: 14, fontWeight: 900, cursor: !tcgCard || saving ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, textTransform: "uppercase", letterSpacing: "0.05em", boxShadow: !tcgCard || saving ? "none" : "0 4px 20px rgba(0,196,188,0.35)" }}>
              {saving ? <LoadingSpinner /> : <><MatIcon name="add" size={18} color="#fff" /> {isDuplicate ? "Add Another Copy" : "Add to Collection"}</>}
            </button>
          </div>
          {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}
        </div>
      );
    }

    // ── BinderScreen ─────────────────────────────────────────────────────────
    function BinderScreen({ setId, setLang: setLangProp, setSource: setSourceProp, initialCardId, navigate, goBack }) {
      // Support both explicit props (from "All Sets" navigation) and prefix-encoded IDs
      // (from "My Sets" navigation where only setId is stored in the collection)
      const isTcgdex = setSourceProp === "tcgdex" || (setId || "").startsWith("tcgdex-");
      const effectiveLang = setLangProp || (isTcgdex ? (setId || "").split("-")[1] : null);
      const tcgdexRawId = isTcgdex && effectiveLang ? (setId || "").replace(`tcgdex-${effectiveLang}-`, "") : null;
      const [collection, setCollection] = useState(null);
      const [setCards, setSetCards] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedCard, setSelectedCard] = useState(null);
      const [actionCard, setActionCard] = useState(null);
      const [identifying, setIdentifying] = useState(false);
      const [actionSaving, setActionSaving] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [debouncedQuery, setDebouncedQuery] = useState("");
      const searchTimer = useRef(null);
      const [filterMode, setFilterMode] = useState("all");
      const [toast, setToast] = useState(null);
      const [favorites, setFavorites] = useState({});
      const [wishlist, setWishlist] = useState({});
      const highlightedCardRef = useRef(null);

      useEffect(() => {
        let mounted = true;
        async function load() {
          if (!setId) { setError("No set selected"); setLoading(false); return; }
          try {
            const col = await loadCollection();
            if (!mounted) return;
            setCollection(col);
            const [favoriteCards, wishlistCards] = await Promise.all([loadCardList(FAVORITES_KEY), loadCardList(WISHLIST_KEY)]);
            if (!mounted) return;
            setFavorites(favoriteCards); setWishlist(wishlistCards);
            const cards = isTcgdex
              ? await fetchTcgdexSetCards(effectiveLang, tcgdexRawId, setId)
              : await fetchSetCards(setId);
            if (!mounted) return;
            cards.sort((a, b) => {
              const numA = parseInt((a.number || "").replace(/\D/g, '')) || 0;
              const numB = parseInt((b.number || "").replace(/\D/g, '')) || 0;
              if (numA !== numB) return numA - numB;
              return (a.number || "").localeCompare(b.number || "");
            });
            setSetCards(cards);
            if (!isTcgdex) {
              const refreshedCol = await refreshSetPrices(setId, cards, col);
              if (!mounted) return;
              setCollection(refreshedCol);
            }
          } catch (e) {
            if (mounted) setError(
              e.message === "OFFLINE" ? "No internet connection — check your network and try again" :
              e.message === "RATE_LIMITED" ? "Too many requests — try again in a moment" :
              e.message || "Failed to load set"
            );
          }
          finally { if (mounted) setLoading(false); }
        }
        load();
        return () => { mounted = false; };
      }, [setId]);

      useEffect(() => {
        if (!initialCardId || loading || setCards.length === 0) return;
        const targetCard = setCards.find(card => card.id === initialCardId);
        if (!targetCard) return;
        const storedCard = collection?.cards?.[initialCardId];
        if (storedCard) setSelectedCard(storedCard);
        else setActionCard(targetCard);
        requestAnimationFrame(() => { highlightedCardRef.current?.scrollIntoView({ behavior: "smooth", block: "center" }); });
      }, [initialCardId, loading, setCards, collection]);

      if (loading) return <div style={{ minHeight: "100vh", display: "flex", justifyContent: "center", alignItems: "center", background: "#000000" }}><LoadingSpinner label="Loading Binder…" /></div>;
      if (error) return <div style={{ minHeight: "100vh", padding: 20, background: "#000000", color: "#FFFFFF" }}>Error: {error}<br/><br/><button onClick={goBack || (() => navigate("binder"))} style={{ padding: "10px 24px", minHeight: 44, background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#FFFFFF", cursor: "pointer", fontWeight: 700 }}>Back to Binder</button></div>;

      const ownedIds = new Set();
      let ownedValue = 0;
      if (collection) {
        Object.values(collection.cards).forEach(c => {
          if (c.setId === setId) { ownedIds.add(c.id); ownedValue += (c.marketPrice ?? 0) * c.quantity; }
        });
      }
      const uniqueOwned = setCards.filter(c => ownedIds.has(c.id)).length;
      const totalInSet = setCards.length;
      const progressPercent = totalInSet > 0 ? Math.min(100, Math.round((uniqueOwned / totalInSet) * 100)) : 0;
      const setInfo = setCards[0]?.set;

      const filteredCards = setCards.filter(card => {
        const q = debouncedQuery.toLowerCase().trim();
        if (q && !card.name.toLowerCase().includes(q) && !card.number.toLowerCase().includes(q)) return false;
        const isOwned = ownedIds.has(card.id);
        const isChase = CHASE_RARITIES.has(card.rarity);
        if (filterMode === "collected" && !isOwned) return false;
        if (filterMode === "missing" && isOwned) return false;
        if (filterMode === "chase" && !isChase) return false;
        return true;
      });

      async function handleQuantityChange(cardId, delta) {
        try {
          const updated = await adjustCardQuantity(cardId, delta);
          setCollection(updated);
          const nextCard = updated.cards[cardId] ?? null;
          setSelectedCard(nextCard);
          if (!nextCard) setToast({ message: "Card removed from collection", type: "info" });
          else setToast({ message: delta > 0 ? "Added another copy" : "Removed one copy", type: "info" });
        } catch { setToast({ message: "Could not update quantity", type: "error" }); }
      }

      async function handleRemoveCard(cardId) {
        try {
          const updated = await removeCardFromCollection(cardId);
          setCollection(updated); setSelectedCard(null);
          setToast({ message: "Card removed from collection", type: "info" });
        } catch { setToast({ message: "Could not remove card", type: "error" }); }
      }

      async function handleSavedCardToggle(kind, card, isActive) {
        const key = kind === "favorite" ? FAVORITES_KEY : WISHLIST_KEY;
        const setState = kind === "favorite" ? setFavorites : setWishlist;
        const label = kind === "favorite" ? "Favorites" : "Wishlist";
        try {
          const updated = isActive ? await removeCardFromList(key, card.id) : await addCardToList(key, card);
          setState(updated);
          setToast({ message: isActive ? `Removed from ${label}` : `Added to ${label}`, type: "info" });
        } catch { setToast({ message: `Could not update ${label.toLowerCase()}`, type: "error" }); }
      }

      async function handleAddSpecificCard(card) {
        if (!card) return;
        setActionSaving(true);
        try {
          const updated = await saveCard(card, extractPrice(card));
          setCollection(updated); setActionCard(null);
          setToast({ message: "Card added to collection!", type: "info" });
          const savedCard = updated.cards[card.id];
          if (savedCard) setTimeout(() => setSelectedCard(savedCard), 120);
        } catch { setToast({ message: "Failed to add card", type: "error" }); }
        finally { setActionSaving(false); }
      }

      return (
        <div style={{ minHeight: "100vh", background: "#000000", color: "#FFFFFF", paddingBottom: 110 }}>
          {/* Header */}

                           } finally { setIdentifying(false); }
                         };
                         reader.readAsDataURL(file);

                    </label>
