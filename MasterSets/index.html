    // ── ProfileScreen ─────────────────────────────────────────────────────────
    function ProfileScreen({ authState, authLoading, refreshAuth, navigate, goBack, embedded = false }) {
      const [busy, setBusy] = useState(false);
      const [toast, setToast] = useState(null);
      const [syncMeta, setSyncMeta] = useState(null);
      const [showEmailInput, setShowEmailInput] = useState(false);
      const [emailDraft, setEmailDraft] = useState("");

      useEffect(() => {
        let mounted = true;
        loadSyncMeta().then(meta => { if (mounted) setSyncMeta(meta); });
        return () => { mounted = false; };
      }, [authState]);

      async function handleAppleSignIn() {
        setBusy(true);
        try { await signInWithApple(); setToast({ message: "Continuing sign in with Apple…", type: "info" }); }
        catch (e) { setToast({ message: e.message === "AUTH_NOT_CONFIGURED" ? "Supabase auth is not configured yet" : "Sign in failed", type: "error" }); }
        finally { setBusy(false); }
      }

      async function handleEmailSignIn() {
        const email = emailDraft.trim(); if (!email) return;
        setBusy(true);
        try {
          await signInWithEmail(email);
          setToast({ message: "Magic link sent — check your email!", type: "info" });
          setShowEmailInput(false); setEmailDraft("");
        } catch (e) { setToast({ message: e.message === "AUTH_NOT_CONFIGURED" ? "Supabase auth is not configured yet" : "Email sign in failed", type: "error" }); }
        finally { setBusy(false); }
      }

      async function handleSignOut() {
        setBusy(true);
        try { await signOutAuth(); await refreshAuth(); setSyncMeta(await loadSyncMeta()); setToast({ message: "Signed out", type: "info" }); }
        catch { setToast({ message: "Sign out failed", type: "error" }); }
        finally { setBusy(false); }
      }

      async function handleSyncNow() {
        setBusy(true);
        try {
          await Promise.all([loadCollection(), loadCardList(FAVORITES_KEY), loadCardList(WISHLIST_KEY), refreshAuth()]);
          setSyncMeta(await loadSyncMeta());
          setToast({ message: "Sync complete", type: "info" });
        } catch { setToast({ message: "Sync failed", type: "error" }); }
        finally { setBusy(false); }
      }

      const profile = authState?.profile;
      const configured = authState?.configured;
      const signedIn = Boolean(authState?.user);

      return (
        <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "#000000", color: "#FFFFFF" }}>
          <div className="safe-t16" style={{ flexShrink: 0, padding: "16px 20px", background: "rgba(28,28,30,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", display: "flex", alignItems: "center", gap: 12 }}>
            {!embedded && (
              <button onClick={goBack || (() => navigate("user"))} style={{ background: "none", border: "none", color: "#A1A1A1", cursor: "pointer", fontSize: 14, padding: "8px", minHeight: 44, display: "flex", alignItems: "center" }}>
                <MatIcon name="arrow_back" size={22} color="#A1A1A1" />
              </button>
            )}
            <img src="./MSLogo_noBak.png" alt="Master Sets" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ width: 36, height: 36, objectFit: "contain", flexShrink: 0 }} />
            <div style={{ fontSize: 22, fontWeight: 900, letterSpacing: "-0.02em", textTransform: "uppercase" }}>Profile</div>
          </div>

          <div style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: 20, paddingBottom: 100 }}>
            {/* Account card */}
            <div style={{ background: "#131315", borderRadius: 32, padding: 20, marginBottom: 12 }}>
              <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 16, fontWeight: 700 }}>Account</div>
              {authLoading ? <LoadingSpinner label="Loading account…" /> : signedIn ? (
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ width: 52, height: 52, borderRadius: "50%", background: "#00C4BC", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, boxShadow: "0 4px 16px rgba(0,196,188,0.35)" }}>
                    <MatIcon name="person" size={26} color="#fff" />
                  </div>
                  <div>
                    <div style={{ fontSize: 20, fontWeight: 900, marginBottom: 2, letterSpacing: "-0.02em" }}>{profile?.displayName || "Trainer"}</div>
                    <div style={{ color: "#A1A1A1", fontSize: 13, marginBottom: 2 }}>{profile?.email || "No email"}</div>
                    <div style={{ color: "#6C6C6E", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700 }}>{profile?.provider || "unknown"}</div>
                  </div>
                </div>
              ) : (
                <div style={{ textAlign: "center", padding: "6px 0" }}>
                  <div style={{ width: 56, height: 56, borderRadius: "50%", background: "#1C1C1E", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 14px" }}>
                    <MatIcon name="person" size={28} color="#A1A1A1" />
                  </div>
                  <div style={{ fontSize: 18, fontWeight: 900, marginBottom: 8, letterSpacing: "-0.02em" }}>Sign in to sync your collection</div>
                  <div style={{ color: "#A1A1A1", fontSize: 14, lineHeight: 1.6, maxWidth: 260, margin: "0 auto" }}>Keep your cards safe and access them across all your devices.</div>
                </div>
              )}
            </div>

            {/* Sync status */}
            <div style={{ background: "#131315", borderRadius: 32, padding: 20, marginBottom: 12 }}>
              <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 16, fontWeight: 700 }}>Sync Status</div>
              <div style={{ display: "grid", gap: 0 }}>
                {[
                  { label: "Session",   value: signedIn ? "Signed In" : "Signed Out", ok: signedIn },
                  { label: "Storage",   value: syncMeta?.collectionMode === "cloud" ? "Cloud" : "On Device", ok: syncMeta?.collectionMode === "cloud" },
                  { label: "Last Sync", value: syncMeta?.lastSyncedAt ? new Date(syncMeta.lastSyncedAt).toLocaleString() : "Not yet", ok: !!syncMeta?.lastSyncedAt },
                ].map(({ label, value, ok }, i, arr) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14, padding: "14px 0", borderBottom: i < arr.length - 1 ? "1px solid #3A3A3C" : "none" }}>
                    <span style={{ color: "#A1A1A1", fontWeight: 600 }}>{label}</span>
                    <span style={{ fontWeight: 700, color: ok ? "#30D158" : "#FFFFFF" }}>{value}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Actions */}
            <div style={{ display: "grid", gap: 10 }}>
              {!signedIn && (
                <>
                  <button onClick={handleAppleSignIn} disabled={busy} style={{ padding: "16px", minHeight: 56, background: busy ? "#3A3A3C" : "#00C4BC", borderRadius: 9999, color: "#fff", fontWeight: 900, border: "none", cursor: busy ? "not-allowed" : "pointer", fontSize: 15, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                    {busy ? "Signing in…" : "Continue with Apple"}
                  </button>
                  {showEmailInput ? (
                    <div style={{ display: "grid", gap: 8 }}>
                      <input type="email" autoFocus value={emailDraft} onChange={e => setEmailDraft(e.target.value)} onKeyDown={e => e.key === "Enter" && handleEmailSignIn()} placeholder="you@example.com" style={{ padding: "14px 18px", background: "#1C1C1E", border: "none", borderRadius: 9999, color: "#FFFFFF", fontSize: 16, outline: "none", minHeight: 56 }} />
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                        <button onClick={handleEmailSignIn} disabled={busy || !emailDraft.trim()} style={{ padding: "14px", minHeight: 52, background: emailDraft.trim() ? "#00C4BC" : "#3A3A3C", borderRadius: 9999, color: "#fff", fontWeight: 800, border: "none", cursor: "pointer", fontSize: 14 }}>{busy ? "Sending…" : "Send Link"}</button>
                        <button onClick={() => { setShowEmailInput(false); setEmailDraft(""); }} style={{ padding: "14px", minHeight: 52, background: "#1C1C1E", borderRadius: 9999, color: "#A1A1A1", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 14 }}>Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={() => setShowEmailInput(true)} disabled={busy} style={{ padding: "16px", minHeight: 56, background: "#1C1C1E", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, border: "none", cursor: busy ? "not-allowed" : "pointer", fontSize: 15 }}>Sign In with Email</button>
                  )}
                </>
              )}
              {signedIn && (
                <>
                  <button onClick={handleSyncNow} disabled={busy} style={{ padding: "16px", minHeight: 56, background: busy ? "#3A3A3C" : "#00C4BC", borderRadius: 9999, color: "#fff", fontWeight: 900, border: "none", cursor: busy ? "not-allowed" : "pointer", fontSize: 15, textTransform: "uppercase", letterSpacing: "0.05em" }}>{busy ? "Syncing…" : "Sync Now"}</button>
                  <button onClick={refreshAuth} disabled={busy} style={{ padding: "16px", minHeight: 56, background: "#1C1C1E", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, border: "none", cursor: busy ? "not-allowed" : "pointer", fontSize: 15 }}>Refresh Session</button>
                  <button onClick={handleSignOut} disabled={busy} style={{ padding: "16px", minHeight: 56, background: "rgba(0,196,188,0.08)", borderRadius: 9999, color: "#fca5a5", fontWeight: 700, border: "1px solid rgba(0,196,188,0.25)", cursor: busy ? "not-allowed" : "pointer", fontSize: 15 }}>Sign Out</button>
                </>
              )}
            </div>

            {!configured && (
              <div style={{ marginTop: 16, background: "#131315", borderRadius: 20, padding: 16, color: "#A1A1A1", fontSize: 13, lineHeight: 1.5 }}>
                Cloud sync is not yet configured. Your collection is saved locally on this device.
              </div>
            )}
          </div>
          {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}
        </div>
      );
    }

    // Persists binder-tab state across unmounts so back-navigation restores position
    const _binderViewState = window._binderViewState || (window._binderViewState = { activeTab: "my", setsLang: "en" });

    // ── DashboardScreen ───────────────────────────────────────────────────────
    function DashboardScreen({ navigate, authState, authLoading, mode = "home" }) {
      const [collection, setCollection] = useState(null);
      const [setCaches, setSetCaches] = useState({});
      const [allSets, setAllSets] = useState([]);
      const [allSetsCount, setAllSetsCount] = useState(null);
      const [recentImports, setRecentImports] = useState([]);
      const [allSetsLoading, setAllSetsLoading] = useState(false);
      const [allSetsError, setAllSetsError] = useState(null);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [activeTab, setActiveTabState] = useState(mode === "binder" ? _binderViewState.activeTab : "my");
      const setActiveTab = (v) => { if (mode === "binder") _binderViewState.activeTab = v; setActiveTabState(v); };
      const [allSetsPage, setAllSetsPage] = useState(60);
      const [favorites, setFavorites] = useState({});
      const [wishlist, setWishlist] = useState({});
      const [selectedSavedCard, setSelectedSavedCard] = useState(null);
      const [enrichedCards, setEnrichedCards] = useState({});
      const [setsLang, setSetsLangState] = useState(mode === "binder" ? _binderViewState.setsLang : "en");
      const setSetsLang = (v) => { if (mode === "binder") _binderViewState.setsLang = v; setSetsLangState(v); };
      const [foreignSets, setForeignSets] = useState([]);
      const [foreignSetsLoading, setForeignSetsLoading] = useState(false);
      const [foreignSetsError, setForeignSetsError] = useState(null);
      const [foreignSetsPage, setForeignSetsPage] = useState(60);
      const [showMoreLangs, setShowMoreLangs] = useState(false);
      const foreignSetsCacheRef = useRef({});
      const isHomeMode = mode === "home";

      useEffect(() => {
        const onQuotaExceeded = () => setToast({ message: "Device storage full — some data may not be saved", type: "error" });
        window.addEventListener('storageQuotaExceeded', onQuotaExceeded);
        return () => window.removeEventListener('storageQuotaExceeded', onQuotaExceeded);
      }, []);

      useEffect(() => {
        let mounted = true;
        async function init() {
          window.__cloudSyncFailed = false;
          const [col, importHistory] = await Promise.all([loadCollection(), loadImportHistory()]);
          if (!mounted) return;
          setCollection(col); setRecentImports(importHistory);
          if (window.__cloudSyncFailed) setToast({ message: "Cloud sync unavailable — using local data", type: "warning" });
          const setIds = [...new Set(Object.values(col.cards).map(c => c.setId))];
          if (setIds.length > 0) {
            const entries = await Promise.all(setIds.map(async id => {
              try {
                const cached = await window.storage.get(`set_cache_${id}`);
                if (!cached) return [id, null];
                const parsed = JSON.parse(cached.value);
                if (Date.now() - parsed.timestamp > 24 * 60 * 60 * 1000) return [id, null];
                return [id, { total: parsed.cards.length }];
              } catch { return [id, null]; }
            }));
            if (!mounted) return;
            const map = {};
            entries.forEach(([id, v]) => { if (v) map[id] = v; });
            setSetCaches(map);
          }
          if (mounted) setLoading(false);
        }
        init();
        return () => { mounted = false; };
      }, []);

      useEffect(() => {
        if (!isHomeMode) return;
        let mounted = true;
        fetchAllSets().then(sets => { if (mounted) setAllSetsCount(sets.length); }).catch(() => {});
        return () => { mounted = false; };
      }, [isHomeMode]);

      useEffect(() => {
        if (isHomeMode) return;
        let mounted = true;
        Promise.all([loadCardList(FAVORITES_KEY), loadCardList(WISHLIST_KEY)])
          .then(([favs, wish]) => { if (mounted) { setFavorites(favs); setWishlist(wish); } })
          .catch(() => {});
        return () => { mounted = false; };
      }, [isHomeMode]);

      useEffect(() => {
        if (isHomeMode) return;
        const allCards = [...Object.values(favorites), ...Object.values(wishlist)];
        const needsEnrich = allCards.filter(c => /^Card \d+$/i.test(c.name));
        if (needsEnrich.length === 0) return;
        let mounted = true;
        const setIds = [...new Set(needsEnrich.map(c => c.setId).filter(Boolean))];
        async function enrich() {
          const nameMap = {};
          for (const setId of setIds) {
            try {
              const cached = await window.storage.get(`set_cache_${setId}`);
              if (cached) {
                const parsed = JSON.parse(cached.value);
                (parsed.cards || []).forEach(c => { nameMap[c.id] = { name: c.name, rarity: c.rarity }; });
              }
            } catch {}
          }
          const stillMissing = needsEnrich.filter(c => !nameMap[c.id]);
          await Promise.all(stillMissing.map(async c => {
            try {
              const resp = await fetch(`https://api.pokemontcg.io/v2/cards/${c.id}`);
              if (!resp.ok) return;
              const data = await resp.json();
              if (data.data) nameMap[c.id] = { name: data.data.name, rarity: data.data.rarity };
            } catch {}
          }));
          if (mounted && Object.keys(nameMap).length > 0) setEnrichedCards(prev => ({ ...prev, ...nameMap }));
        }
        enrich();
        return () => { mounted = false; };
      }, [favorites, wishlist, isHomeMode]);

      useEffect(() => {
        if (isHomeMode || allSets.length > 0 || allSetsLoading) return;
        let mounted = true;
        async function loadAllSets() {
          setAllSetsLoading(true); setAllSetsError(null);
          try { const sets = await fetchAllSets(); if (!mounted) return; setAllSets(sets); }
          catch (e) { if (!mounted) return; setAllSetsError("Could not load all sets right now"); }
          finally { if (mounted) setAllSetsLoading(false); }
        }
        loadAllSets();
        return () => { mounted = false; };
      }, [activeTab, allSets.length, allSetsLoading]);

      useEffect(() => {
        if (isHomeMode || activeTab !== "all") return;
        if (setsLang === "en") { setForeignSets([]); setForeignSetsLoading(false); setForeignSetsError(null); return; }
        if (foreignSetsCacheRef.current[setsLang]) {
          setForeignSets(foreignSetsCacheRef.current[setsLang]);
          setForeignSetsLoading(false);
          return;
        }
        let mounted = true;
        setForeignSetsLoading(true); setForeignSetsError(null); setForeignSets([]);
        fetchTcgdexSets(setsLang)
          .then(sets => {
            if (!mounted) return;
            foreignSetsCacheRef.current[setsLang] = sets;
            setForeignSets(sets); setForeignSetsPage(60);
          })
          .catch(() => { if (mounted) setForeignSetsError("Could not load sets for this language — check your connection"); })
          .finally(() => { if (mounted) setForeignSetsLoading(false); });
        return () => { mounted = false; };
      }, [setsLang, activeTab, isHomeMode]);

      const cards = collection ? Object.values(collection.cards) : [];
      const uniqueCount = cards.length;
      const totalCount = cards.reduce((s, c) => s + (c.quantity ?? 1), 0);
      const totalValue = collection?.totalValue ?? 0;
      const latestPriceUpdate = cards.reduce((latest, c) => {
        if (!c.priceUpdatedAt) return latest;
        const t = new Date(c.priceUpdatedAt).getTime();
        return t > latest ? t : latest;
      }, 0);
      const priceAgeLabel = (() => {
        if (!latestPriceUpdate) return null;
        const mins = Math.floor((Date.now() - latestPriceUpdate) / 60000);
        if (mins < 60) return `${mins}m ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs}h ago`;
        return `${Math.floor(hrs / 24)}d ago`;
      })();
      const recentCards = [...cards].sort((a, b) => {
        const ta = a.scannedAt ? new Date(a.scannedAt).getTime() : 0;
        const tb = b.scannedAt ? new Date(b.scannedAt).getTime() : 0;
        return (Number.isFinite(tb) ? tb : 0) - (Number.isFinite(ta) ? ta : 0);
      }).slice(0, 4);

      const sets = {};
      for (const card of cards) {
        if (!sets[card.setId]) sets[card.setId] = { setId: card.setId, setName: card.setName, owned: 0, chaseOwned: 0, value: 0 };
        sets[card.setId].owned += 1;
        if (card.rarity && CHASE_RARITIES.has(card.rarity)) sets[card.setId].chaseOwned += 1;
        sets[card.setId].value += (card.marketPrice ?? 0) * (card.quantity ?? 1);
      }
      const setList = Object.values(sets);
      const visibleAllSets = allSets.slice(0, allSetsPage);
      const allSetsMap = {};
      allSets.forEach(s => { allSetsMap[s.id] = s; });
      const completedSets = setList.filter(s => {
        const total = setCaches[s.setId]?.total;
        return total && s.owned >= total;
      }).length;
      const inProgressSets = setList.length - completedSets;

      async function handleSavedCardToggle(kind, card, isActive) {
        const key = kind === "favorite" ? FAVORITES_KEY : WISHLIST_KEY;
        const setState = kind === "favorite" ? setFavorites : setWishlist;
        const label = kind === "favorite" ? "Favorites" : "Wishlist";
        try {
          const updated = isActive ? await removeCardFromList(key, card.id) : await addCardToList(key, card);
          setState(updated);
          setToast({ message: isActive ? `Removed from ${label}` : `Added to ${label}`, type: "info" });
        } catch { setToast({ message: `Could not update ${label.toLowerCase()}`, type: "error" }); }
      }

      return (
        <div style={{ minHeight: "100vh", background: "#000000", color: "#FFFFFF", paddingBottom: 100 }}>
          {/* Header */}
          <div className="safe-t20" style={{ background: "#000000", position: "sticky", top: 0, zIndex: 10, padding: "0 12px 8px" }}>
            <div style={{ borderRadius: 16, overflow: "hidden" }}>
              <img src="./MSBanner.png" alt="Master Sets" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ width: "100%", height: 82, objectFit: "cover", objectPosition: "center", display: "block" }} />
            </div>
          </div>

          <div style={{ padding: "20px 20px 0" }}>
            {loading ? <LoadingSpinner label="Loading collection…" /> : (
              <>
                {isHomeMode && (
                  <>
                    {/* Hero value card */}
                    <div style={{ background: "#131315", borderRadius: 32, padding: "28px 24px", marginBottom: 12 }}>
                      <div style={{ fontSize: 10, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.2em", marginBottom: 10 }}>Total Collection Value</div>
                      <div style={{ fontSize: 52, fontWeight: 900, color: "#30D158", letterSpacing: "-0.04em", lineHeight: 1 }}>{formatPrice(totalValue)}</div>
                      {priceAgeLabel && <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 8 }}>Prices updated {priceAgeLabel}</div>}
                    </div>
                    {/* Secondary stats */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
                      {[
                        { label: "Total Cards", value: totalCount },
                        { label: "Sets Started", value: setList.length },
                      ].map(({ label, value }) => (
                        <div key={label} style={{ background: "#131315", borderRadius: 24, padding: "18px 20px" }}>
                          <div style={{ fontSize: 36, fontWeight: 900, color: "#FFFFFF", marginBottom: 6, letterSpacing: "-0.03em", lineHeight: 1 }}>{value}</div>
                          <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700 }}>{label}</div>
                        </div>
                      ))}
                    </div>
                  </>
                )}

                {isHomeMode ? (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
                    <div onClick={() => navigate("binder")} style={{ background: "#131315", borderRadius: 24, padding: "18px", cursor: "pointer" }}>
                      <div style={{ fontSize: 10, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 14 }}>My Sets</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700 }}>In Progress</span>
                          <span style={{ fontSize: 28, fontWeight: 900, color: "#FFFFFF", letterSpacing: "-0.03em" }}>{inProgressSets}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700 }}>Completed</span>
                          <span style={{ fontSize: 28, fontWeight: 900, color: completedSets > 0 ? "#30D158" : "#FFFFFF", letterSpacing: "-0.03em" }}>{completedSets}</span>
                        </div>
                      </div>
                    </div>
                    <div onClick={() => navigate("binder")} style={{ background: "#131315", borderRadius: 24, padding: "18px", cursor: "pointer" }}>
                      <div style={{ fontSize: 10, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 10 }}>All Sets</div>
                      <div style={{ fontSize: 48, fontWeight: 900, color: "#FFFFFF", lineHeight: 1, letterSpacing: "-0.04em" }}>{allSetsCount ?? "—"}</div>
                      <div style={{ fontSize: 10, color: "#A1A1A1", marginTop: 8, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700 }}>sets available</div>
                    </div>
                  </div>
                ) : (
                  <div style={{ marginBottom: 20 }}>
                    {/* My Sets / All Sets / Favorites / Wishlist tabs */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                      {[["my", "My Sets"], ["all", "All Sets"], ["favorites", "Favorites"], ["wishlist", "Wishlist"]].map(([tabId, label]) => (
                        <button key={tabId} onClick={() => setActiveTab(tabId)} style={{
                          padding: "12px 14px", borderRadius: 9999,
                          background: activeTab === tabId ? "#00C4BC" : "#131315",
                          color: "#fff", fontSize: 12, fontWeight: 800, cursor: "pointer", border: "none",
                          textTransform: "uppercase", letterSpacing: "0.08em",
                        }}>{label}</button>
                      ))}
                    </div>

                    {activeTab === "my" ? (
                      setList.length > 0 ? (
                        <>
                          <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 14, fontWeight: 700 }}>My Sets</div>
                          {[...setList].sort((a, b) => b.value - a.value).map(set => {
                            const setMeta = allSetsMap[set.setId];
                            const cache = setCaches[set.setId];
                            const total = setMeta?.total || cache?.total;
                            const pct = total ? Math.min(100, Math.round((set.owned / total) * 100)) : null;
                            const complete = pct >= 100;
                            const logoUrl = setMeta?.images?.logo || setMeta?.images?.symbol || null;
                            return (
                              <div key={set.setId} onClick={() => navigate("binder", { setId: set.setId })}
                                className="list-row"
                                style={{ background: "#131315", borderRadius: 24, padding: "18px 20px", marginBottom: 10, cursor: "pointer" }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: pct !== null ? 12 : 0 }}>
                                  {logoUrl && (
                                    <div style={{ width: 72, height: 36, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                      <img src={logoUrl} alt={set.setName} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ maxWidth: 72, maxHeight: 36, objectFit: "contain" }} />
                                    </div>
                                  )}
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.01em", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{set.setName}</div>
                                    <div style={{ color: "#30D158", fontSize: 16, fontWeight: 900, marginTop: 4, letterSpacing: "-0.02em" }}>{formatPrice(set.value)}</div>
                                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 6 }}>
                                      <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "#A1A1A1" }}>
                                        <MatIcon name="auto_stories" size={14} color="#A1A1A1" />
                                        <span>{set.owned} / {total || "?"} cards</span>
                                      </div>
                                      {set.chaseOwned > 0 && (
                                        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "#00C4BC", fontWeight: 700 }}>
                                          <MatIcon name="star" size={13} color="#00C4BC" filled={true} />
                                          <span>{set.chaseOwned} Chase</span>
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                                    {pct !== null && (
                                      complete ? (
                                        <div style={{ width: 44, height: 44, borderRadius: "50%", background: "rgba(48,209,88,0.15)", border: "2px solid rgba(48,209,88,0.5)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                          <MatIcon name="check" size={24} color="#30D158" />
                                        </div>
                                      ) : (
                                        <div style={{ background: "#1C1C1E", borderRadius: 9999, padding: "4px 10px", fontSize: 10, fontWeight: 800, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.08em" }}>{pct}%</div>
                                      )
                                    )}
                                    {!complete && <MatIcon name="chevron_right" size={18} color="#3A3A3C" />}
                                  </div>
                                </div>
                                {pct !== null && (
                                  <div style={{ background: "#3A3A3C", borderRadius: 4, height: 4 }}>
                                    <div className={complete ? "progress-fill-green" : "progress-fill"} style={{ width: `${pct}%`, height: 4 }} />
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </>
                      ) : (
                        <div style={{ background: "#131315", borderRadius: 24, padding: "48px 24px", textAlign: "center", marginTop: 8 }}>
                          <div style={{ width: 56, height: 56, background: "#1C1C1E", borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
                            <MatIcon name="auto_stories" size={28} color="#3A3A3C" />
                          </div>
                          <div style={{ fontSize: 17, fontWeight: 900, color: "#FFFFFF", marginBottom: 8, textTransform: "uppercase", letterSpacing: "-0.01em" }}>No cards yet</div>
                          <div style={{ fontSize: 13, color: "#A1A1A1" }}>Scan your first card to start your collection.</div>
                        </div>
                      )
                    ) : activeTab === "all" ? (
                      <>
                        <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 14, fontWeight: 700 }}>All Sets</div>

                        {/* Language selector */}
                        <div style={{ display: "flex", gap: 8, marginBottom: showMoreLangs ? 0 : 16 }}>
                          <button onClick={() => { setSetsLang("en"); setShowMoreLangs(false); }} style={{ padding: "9px 18px", borderRadius: 9999, border: "none", cursor: "pointer", fontWeight: 800, fontSize: 12, background: setsLang === "en" ? "#00C4BC" : "#1C1C1E", color: "#fff", textTransform: "uppercase", letterSpacing: "0.06em" }}>English</button>
                          <button onClick={() => setShowMoreLangs(m => !m)} style={{ padding: "9px 18px", borderRadius: 9999, border: "none", cursor: "pointer", fontWeight: 800, fontSize: 12, background: setsLang !== "en" ? "#00C4BC" : "#1C1C1E", color: "#fff", textTransform: "uppercase", letterSpacing: "0.06em", whiteSpace: "nowrap" }}>Other Languages {showMoreLangs ? "▲" : "▼"}</button>
                        </div>
                        {showMoreLangs && (
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16, padding: "14px 0 6px", borderTop: "1px solid #1C1C1E" }}>
                            {TCGDEX_LANGS.map(lang => (
                              <button key={lang.code} onClick={() => { setSetsLang(lang.code); setShowMoreLangs(false); }} style={{ padding: "8px 16px", borderRadius: 9999, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, background: setsLang === lang.code ? "#00C4BC" : "#131315", color: setsLang === lang.code ? "#fff" : "#A1A1A1", whiteSpace: "nowrap" }}>{lang.native} <span style={{ fontSize: 10, opacity: 0.65 }}>· {lang.name}</span></button>
                            ))}
                          </div>
                        )}

                        {/* Sets list — keyed to setsLang so React fully replaces the subtree on language change */}
                        <div key={setsLang}>
                        {setsLang === "en" ? (
                          allSetsLoading ? <LoadingSpinner label="Loading sets…" /> : allSetsError ? (
                            <div style={{ background: "rgba(0,196,188,0.08)", borderRadius: 16, padding: "12px 16px", color: "#fca5a5", fontSize: 14 }}>{allSetsError}</div>
                          ) : (
                            <>
                              <div style={{ color: "#A1A1A1", fontSize: 13, marginBottom: 14 }}>Browse available Pokémon TCG sets and open any binder view.</div>
                              {visibleAllSets.map(set => {
                                const chaseCount = (set.total && set.printedTotal && set.total > set.printedTotal) ? set.total - set.printedTotal : 0;
                                return (
                                  <div key={set.id} onClick={() => navigate("binder", { setId: set.id })} className="list-row"
                                    style={{ background: "#131315", borderRadius: 24, padding: "16px 18px", marginBottom: 10, cursor: "pointer" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                                      {set.images?.logo ? (
                                        <div style={{ width: 80, height: 40, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                          <img src={set.images.logo} alt={set.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ maxWidth: 80, maxHeight: 40, objectFit: "contain" }} />
                                        </div>
                                      ) : set.images?.symbol ? (
                                        <img src={set.images.symbol} alt={set.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ width: 32, height: 32, objectFit: "contain", flexShrink: 0 }} />
                                      ) : null}
                                      <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ fontWeight: 800, fontSize: 15, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{set.name}</div>
                                        <div style={{ color: "#A1A1A1", fontSize: 12, marginTop: 2 }}>{set.series || "Pokémon TCG"}</div>
                                      </div>
                                      <MatIcon name="chevron_right" size={18} color="#3A3A3C" />
                                    </div>
                                    <div style={{ display: "flex", gap: 8 }}>
                                      <div style={{ flex: 1, background: "#1C1C1E", borderRadius: 16, padding: "10px 12px" }}>
                                        <div style={{ fontSize: 9, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 4 }}>All Cards</div>
                                        <div style={{ fontSize: 22, fontWeight: 900, color: "#FFFFFF", lineHeight: 1, letterSpacing: "-0.02em" }}>{set.total ?? "—"}</div>
                                      </div>
                                      <div style={{ flex: 1, background: "#1C1C1E", borderRadius: 16, padding: "10px 12px" }}>
                                        <div style={{ fontSize: 9, color: "#A1A1A1", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 4 }}>Chase</div>
                                        <div style={{ fontSize: 22, fontWeight: 900, color: chaseCount > 0 ? "#00C4BC" : "#A1A1A1", lineHeight: 1, letterSpacing: "-0.02em" }}>{chaseCount > 0 ? chaseCount : "—"}</div>
                                      </div>
                                    </div>
                                  </div>
                                );
                              })}
                              {allSets.length > allSetsPage && (
                                <button onClick={() => setAllSetsPage(p => p + 60)} style={{ width: "100%", padding: "14px", background: "#131315", border: "none", borderRadius: 9999, color: "#A1A1A1", fontWeight: 800, fontSize: 13, cursor: "pointer", marginTop: 4, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                                  Load More ({allSets.length - allSetsPage} remaining)
                                </button>
                              )}
                            </>
                          )
                        ) : (
                          foreignSetsLoading ? <LoadingSpinner label="Loading sets…" /> : foreignSetsError ? (
                            <div style={{ background: "rgba(0,196,188,0.08)", borderRadius: 16, padding: "12px 16px", color: "#fca5a5", fontSize: 14 }}>{foreignSetsError}</div>
                          ) : foreignSets.length === 0 ? (
                            <div style={{ background: "#131315", borderRadius: 24, padding: "40px 24px", textAlign: "center" }}>
                              <div style={{ fontSize: 15, color: "#A1A1A1" }}>No sets found for this language.</div>
                            </div>
                          ) : (
                            <>
                              <div style={{ color: "#A1A1A1", fontSize: 13, marginBottom: 14 }}>{foreignSets.length} sets · Pricing not available for non-English sets.</div>
                              {foreignSets.slice(0, foreignSetsPage).map(set => (
                                <div key={set.id} onClick={() => navigate("binder", { setId: set.id, setLang: set._lang, setSource: set._source })} className="list-row"
                                  style={{ background: "#131315", borderRadius: 24, padding: "16px 18px", marginBottom: 10, cursor: "pointer" }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                    {set.images?.logo ? (
                                      <div style={{ width: 80, height: 40, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                        <img src={set.images.logo} alt={set.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ maxWidth: 80, maxHeight: 40, objectFit: "contain" }} />
                                      </div>
                                    ) : set.images?.symbol ? (
                                      <img src={set.images.symbol} alt={set.name} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0"; }} style={{ width: 32, height: 32, objectFit: "contain", flexShrink: 0 }} />
                                    ) : (
                                      <div style={{ width: 36, height: 36, borderRadius: 10, background: "#2C2C2E", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                        <MatIcon name="auto_stories" size={18} color="#6C6C6E" />
                                      </div>
                                    )}
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                      <div style={{ fontWeight: 800, fontSize: 15, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{set.name}</div>
                                      <div style={{ color: "#A1A1A1", fontSize: 12, marginTop: 2 }}>{set.series || "Pokémon TCG"}{set.releaseDate ? ` · ${set.releaseDate.slice(0, 4)}` : ""}</div>
                                    </div>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                                      {set.total > 0 && <div style={{ background: "#1C1C1E", borderRadius: 9999, padding: "4px 10px", fontSize: 11, fontWeight: 800, color: "#A1A1A1" }}>{set.total}</div>}
                                      <MatIcon name="chevron_right" size={18} color="#3A3A3C" />
                                    </div>
                                  </div>
                                </div>
                              ))}
                              {foreignSets.length > foreignSetsPage && (
                                <button onClick={() => setForeignSetsPage(p => p + 60)} style={{ width: "100%", padding: "14px", background: "#131315", border: "none", borderRadius: 9999, color: "#A1A1A1", fontWeight: 800, fontSize: 13, cursor: "pointer", marginTop: 4, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                                  Load More ({foreignSets.length - foreignSetsPage} remaining)
                                </button>
                              )}
                            </>
                          )
                        )}
                        </div>
                      </>
                    ) : (() => {
                      const isFavTab = activeTab === "favorites";
                      const cardMap = isFavTab ? favorites : wishlist;
                      const cardList = Object.values(cardMap).sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
                      const emptyIcon = isFavTab ? "favorite" : "bookmark";
                      const emptyLabel = isFavTab ? "No favorites yet" : "No wishlist cards yet";
                      const emptyHint = isFavTab ? "Tap the heart on any card to save it here." : "Tap the bookmark on any card to save it here.";
                      return cardList.length === 0 ? (
                        <div style={{ background: "#131315", borderRadius: 24, padding: "48px 24px", textAlign: "center", marginTop: 8 }}>
                          <div style={{ width: 56, height: 56, background: "#1C1C1E", borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
                            <MatIcon name={emptyIcon} size={28} color="#3A3A3C" />
                          </div>
                          <div style={{ fontSize: 17, fontWeight: 900, color: "#FFFFFF", marginBottom: 8, textTransform: "uppercase", letterSpacing: "-0.01em" }}>{emptyLabel}</div>
                          <div style={{ fontSize: 13, color: "#A1A1A1" }}>{emptyHint}</div>
                        </div>
                      ) : (
                        <>
                          <div style={{ fontSize: 10, color: "#A1A1A1", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 14, fontWeight: 700 }}>{isFavTab ? "Favorites" : "Wishlist"} · {cardList.length} {cardList.length === 1 ? "card" : "cards"}</div>
                          {cardList.map(card => {
                            const cardName = enrichedCards[card.id]?.name || card.name;
                            const cardRarity = enrichedCards[card.id]?.rarity || card.rarity;
                            const isChase = CHASE_RARITIES.has(cardRarity);
                            return (
                              <div key={card.id} onClick={() => setSelectedSavedCard(card)} className="list-row"
                                style={{ background: "#131315", borderRadius: 20, padding: "12px 16px", marginBottom: 10, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
                                <div style={{ position: "relative", flexShrink: 0 }}>
                                  <img src={card.imageUrl} alt={cardName} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0.3"; }} style={{ width: 52, height: 73, objectFit: "contain", borderRadius: 8, display: "block" }} />
                                  {isChase && <div className="holo-thumbnail" style={{ borderRadius: 8 }} />}
                                </div>
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.01em", marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cardName}</div>
                                  <div style={{ color: "#A1A1A1", fontSize: 12, marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{card.setName}{card.number ? ` · #${card.number}` : ""}</div>
                                  {cardRarity && (
                                    <div style={{ fontSize: 11, fontWeight: 700, color: isChase ? "#00C4BC" : "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.08em" }}>{cardRarity}</div>
                                  )}
                                </div>
                                <div style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                                  {card.marketPrice > 0 && (
                                    <div style={{ fontSize: 14, fontWeight: 900, color: "#30D158", letterSpacing: "-0.02em" }}>{formatPrice(card.marketPrice)}</div>
                                  )}
                                  <MatIcon name="chevron_right" size={18} color="#3A3A3C" />
                                </div>
                              </div>
                            );
                          })}
                        </>
                      );
                    })()}
                  </div>
                )}
              </>
            )}
          </div>
          {/* Saved card detail sheet */}
          {selectedSavedCard && (() => {
            const scName = enrichedCards[selectedSavedCard.id]?.name || selectedSavedCard.name;
            const scRarity = enrichedCards[selectedSavedCard.id]?.rarity || selectedSavedCard.rarity;
            return (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => setSelectedSavedCard(null)} className="fade-in">
              <div style={{ background: "#0D0D0F", borderRadius: "36px 36px 0 0", width: "100%", maxWidth: 480, maxHeight: "92vh", overflowY: "auto", paddingBottom: "env(safe-area-inset-bottom, 24px)" }} onClick={e => e.stopPropagation()} className="slide-up">
                {/* Close row */}
                <div style={{ display: "flex", justifyContent: "flex-end", padding: "16px 20px 0" }}>
                  <button onClick={() => setSelectedSavedCard(null)} style={{ background: "#2C2C2E", border: "none", color: "#A1A1A1", cursor: "pointer", borderRadius: "50%", width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <MatIcon name="close" size={18} />
                  </button>
                </div>
                {/* Hero image */}
                <div style={{ position: "relative", display: "flex", justifyContent: "center", padding: "12px 24px 28px" }}>
                  <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at center, rgba(0,196,188,0.18) 0%, transparent 70%)", pointerEvents: "none" }} />
                  <div style={{ position: "relative", display: "inline-block" }}>
                    <img src={selectedSavedCard.imageUrl} alt={scName} loading="lazy" onError={e => { e.currentTarget.onerror = null; e.currentTarget.style.opacity = "0.3"; }} className={CHASE_RARITIES.has(scRarity) ? "card-aura" : "fade-in-scale"} style={{ width: 210, borderRadius: 16, objectFit: "contain", boxShadow: "0 32px 64px rgba(0,0,0,0.7)", display: "block" }} />
                    {CHASE_RARITIES.has(scRarity) && <div className="holo-overlay" />}
                    {CHASE_RARITIES.has(scRarity) && <div className="holo-detail" />}
                  </div>
                </div>
                {/* Name + set */}
                <div style={{ textAlign: "center", padding: "0 24px 20px" }}>
                  <div style={{ fontSize: 30, fontWeight: 900, letterSpacing: "-0.03em", lineHeight: 1.1, marginBottom: 6 }}>{scName}</div>
                  <div style={{ fontSize: 11, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.12em", fontWeight: 700 }}>{selectedSavedCard.setName}{selectedSavedCard.number ? ` · #${selectedSavedCard.number}` : ""}</div>
                </div>
                {/* Stats */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "0 20px 20px" }}>
                  <div style={{ background: "#1C1C1E", borderRadius: 20, padding: "14px 10px", textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 6 }}>Rarity</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CHASE_RARITIES.has(scRarity) ? "#00C4BC" : "#FFFFFF", textTransform: "uppercase", letterSpacing: "0.04em" }}>{scRarity || "—"}</div>
                  </div>
                  <div style={{ background: "#1C1C1E", borderRadius: 20, padding: "14px 10px", textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 6 }}>Value</div>
                    <div style={{ fontSize: 18, fontWeight: 900, color: "#30D158", letterSpacing: "-0.03em" }}>{formatPrice(selectedSavedCard.marketPrice)}</div>
                  </div>
                </div>
                {/* Favorites / Wishlist toggles */}
                <div style={{ display: "flex", gap: 10, padding: "0 20px 12px" }}>
                  <SavedCardButton active={!!favorites[selectedSavedCard.id]} label="Favorites" onClick={() => handleSavedCardToggle("favorite", selectedSavedCard, !!favorites[selectedSavedCard.id])} />
                  <SavedCardButton active={!!wishlist[selectedSavedCard.id]} label="Wishlist" onClick={() => handleSavedCardToggle("wishlist", selectedSavedCard, !!wishlist[selectedSavedCard.id])} />
                </div>
                {/* Go to set */}
                <div style={{ padding: "0 20px 28px" }}>
                  <button onClick={() => { setSelectedSavedCard(null); navigate("binder", { setId: selectedSavedCard.setId }); }} style={{ width: "100%", padding: "15px", background: "#131315", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 9999, color: "#FFFFFF", fontWeight: 700, cursor: "pointer", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.06em", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                    <MatIcon name="auto_stories" size={16} color="#A1A1A1" /> Go to Set
                  </button>
                </div>
              </div>
            </div>
            );
          })()}
          {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}
        </div>
      );
    }

    // ── App Root ──────────────────────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState("home");
      const [prevTab, setPrevTab] = useState("home");
      const [history, setHistory] = useState([]);
      const [authState, setAuthState] = useState({ configured: false, session: null, user: null, profile: null });
      const [authLoading, setAuthLoading] = useState(true);

      async function refreshAuth() {
        setAuthLoading(true);
        try { const nextState = await getAuthState(); setAuthState(nextState); }
        catch { setAuthState({ configured: hasSupabaseConfig(), session: null, user: null, profile: null }); }
        finally { setAuthLoading(false); }
      }

      useEffect(() => { refreshAuth(); }, []);

      useEffect(() => {
        const client = createSupabaseClient();
        if (!client) return undefined;
        const { data } = client.auth.onAuthStateChange(() => { refreshAuth(); });
        return () => data.subscription.unsubscribe();
      }, []);

      function navigate(screenName, props = {}) {
        const switchTab = (tab) => { setPrevTab(activeTab); setActiveTab(tab); };
        if (screenName === "dashboard") { switchTab("home"); setHistory([]); return; }
        if (screenName === "manual") { switchTab("search"); setHistory(prev => [...prev.slice(-9), { screen: screenName, props }]); return; }
        if (screenName === "bulkImport") { switchTab("search"); setHistory(prev => [...prev.slice(-9), { screen: screenName, props }]); return; }
        if (screenName === "profile") { switchTab("user"); setHistory([]); return; }
        if (screenName === "scan") { switchTab("camera"); setHistory([]); return; }
        if (screenName === "binder" && !props.setId) { switchTab("binder"); setHistory([]); return; }
        if (screenName === "binder") { switchTab("binder"); }
        setHistory(prev => [...prev.slice(-9), { screen: screenName, props }]);
      }

      function goBack() { setHistory(prev => { if (prev.length > 0) return prev.slice(0, -1); return prev; }); }

      const current = history[history.length - 1] || null;
      const screen = current?.screen || null;
      const screenProps = current?.props || {};
      const showingOverlay = Boolean(current);

      return (
        <div style={{ height: "100%", fontFamily: "'Inter', sans-serif", background: "#000000" }}>
          {!showingOverlay && activeTab === "home" && <DashboardScreen navigate={navigate} authState={authState} authLoading={authLoading} mode="home" />}
          {!showingOverlay && activeTab === "binder" && <DashboardScreen navigate={navigate} authState={authState} authLoading={authLoading} mode="binder" />}
          {activeTab === "camera" && <div style={{ display: showingOverlay ? "none" : "block", height: "100%" }}><ScanScreen navigate={navigate} embedded={true} visible={!showingOverlay} goBack={() => { setActiveTab(prevTab); setHistory([]); }} /></div>}
          {!showingOverlay && activeTab === "search" && <SearchHubScreen navigate={navigate} />}
          {!showingOverlay && activeTab === "user" && <ProfileScreen authState={authState} authLoading={authLoading} refreshAuth={refreshAuth} navigate={navigate} embedded={true} />}

          {screen === "confirm" && <ConfirmScreen visionResult={screenProps.visionResult} capturedBase64={screenProps.capturedBase64} navigate={navigate} goBack={goBack} />}
          {screen === "binder" && <BinderScreen setId={screenProps.setId} setLang={screenProps.setLang} setSource={screenProps.setSource} initialCardId={screenProps.initialCardId} navigate={navigate} goBack={goBack} />}
          {screen === "manual" && <ManualEntryScreen prefillName={screenProps.prefillName || ""} prefillSet={screenProps.prefillSet || ""} navigate={navigate} goBack={goBack} />}
          {screen === "bulkImport" && <BulkImportScreen navigate={navigate} goBack={goBack} />}

          {!showingOverlay && activeTab !== "camera" && <BottomTabBar activeTab={activeTab} onTabChange={(tab) => { setPrevTab(activeTab); setActiveTab(tab); setHistory([]); }} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
